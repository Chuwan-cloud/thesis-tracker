const storage = {
  get: async (key) => {
    try {
      if (window.storage && window.storage.get) return await window.storage.get(key);
    } catch {}
    const v = localStorage.getItem(key);
    return v ? { value: v } : null;
  },
  set: async (key, value) => {
    try {
      if (window.storage && window.storage.set) return await window.storage.set(key, value);
    } catch {}
    localStorage.setItem(key, value);
  }
};

function daysLeft(d) {
  if (!d) return null;
  return Math.ceil((new Date(d) - new Date()) / 86400000);
}

function DeadlineBadge({ deadline }) {
  const d = daysLeft(deadline);
  if (d === null) return null;
  const col = d < 0 ? "#ef4444" : d <= 7 ? "#f59e0b" : d <= 30 ? "#3b82f6" : "#10b981";
  const bg  = d < 0 ? "#fef2f2" : d <= 7 ? "#fffbeb" : d <= 30 ? "#eff6ff" : "#ecfdf5";
  return <span style={{ fontSize: 11, fontWeight: 600, color: col, background: bg, padding: "2px 7px", borderRadius: 99, whiteSpace: "nowrap" }}>{d < 0 ? `${Math.abs(d)}日超過` : d === 0 ? "今日！" : `${d}日`}</span>;
}

function PBar({ pct, color }) {
  return (
    <div style={{ background: "#e5e7eb", borderRadius: 99, height: 5, overflow: "hidden", margin: "5px 0 2px" }}>
      <div style={{ width: `${pct}%`, background: color, height: "100%", borderRadius: 99, transition: "width .4s" }} />
    </div>
  );
}

  { title: "レポート課題（後期）", content: "【基本教材2】栗田佳代子・日本教育研究イノベーションセンター編著『インタラクティブ・ティーチング』（河合出版, 2017年）\n\n課題1（3,000〜4,000字）：8週間の講義動画の受講に基づき、①受講したOER教材の学習内容の中から特に重要だと思ったこと、②OER教材を使った学習経験の振り返りと一般化の可能性、について論じる。\n\n課題2（3,000〜5,000字）：自分の教科・ICTを利用したインタラクティブな授業のデザインを検討してシラバスを作成し、その特徴や期待される効果について論じる。" },
];

function WritingGuide({ color }) {
  const [open, setOpen] = useState(false);
  const [sec, setSec] = useState(null);
  return (
    <div style={{ marginTop: 20 }}>
      <button onClick={() => setOpen(o => !o)} style={{ display: "flex", alignItems: "center", gap: 8, background: "#fff", border: "1px solid #e5e7eb", borderRadius: open ? "8px 8px 0 0" : 8, padding: "9px 14px", fontSize: 13, cursor: "pointer", color: "#374151", fontWeight: 600, width: "100%", boxSizing: "border-box" }}>
        <span>📄 覚書：レポート・修論の書き方</span>
        <span style={{ marginLeft: "auto", color: "#9ca3af", fontSize: 11 }}>{open ? "▲" : "▼"}</span>
      </button>
      {open && (
        <div style={{ border: "1px solid #e5e7eb", borderTop: "none", borderRadius: "0 0 8px 8px", background: "#fff" }}>
          {GUIDE_SECTIONS.map((s, i) => (
            <div key={i} style={{ borderBottom: i < GUIDE_SECTIONS.length - 1 ? "1px solid #f3f4f6" : "none" }}>
              <button onClick={() => setSec(sec === i ? null : i)} style={{ width: "100%", textAlign: "left", background: "none", border: "none", padding: "10px 16px", fontSize: 13, fontWeight: 700, color: sec === i ? color : "#374151", cursor: "pointer", display: "flex", justifyContent: "space-between" }}>
                {s.title}<span style={{ color: "#9ca3af", fontWeight: 400, fontSize: 11 }}>{sec === i ? "▲" : "▼"}</span>
              </button>
              {sec === i && <ul style={{ margin: "0 0 10px", padding: "0 16px 0 32px" }}>{s.items.map((it, j) => <li key={j} style={{ fontSize: 12, color: "#4b5563", lineHeight: 1.9 }}>{it}</li>)}</ul>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App() {
  const [projects, setProjects] = useState(null);
  const [selected, setSelected] = useState("thesis");
  const [newTask, setNewTask] = useState("");
  const [newDeadline, setNewDeadline] = useState("");
  const [saving, setSaving] = useState(false);
  const [view, setView] = useState("project");
  const [menuOpen, setMenuOpen] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const r = await storage.get("tracker_v4");
        setProjects(r ? JSON.parse(r.value) : DEFAULT_PROJECTS);
      } catch { setProjects(DEFAULT_PROJECTS); }
    })();
  }, []);

  useEffect(() => {
    if (!projects) return;
    setSaving(true);
    const t = setTimeout(async () => {
      await storage.set("tracker_v4", JSON.stringify(projects));
      setSaving(false);
    }, 700);
    return () => clearTimeout(t);
  }, [projects]);

  if (!projects) return <div style={{ padding: 40, color: "#9ca3af", fontFamily: "sans-serif" }}>読み込み中…</div>;

  const proj = projects.find(p => p.id === selected);
  const isThesis = proj.id === "thesis";

  const calcPct = (p) => {
    if (p.tasks) {
      const d = p.tasks.filter(t => t.done).length;
      return p.tasks.length ? Math.round(d / p.tasks.length * 100) : 0;
    }
    if (p.reports) {
      const total = p.reports.reduce((a, r) => a + r.steps.length, 0);
      const done  = p.reports.reduce((a, r) => a + r.steps.filter(s => s.done).length, 0);
      return total ? Math.round(done / total * 100) : 0;
    }
    return 0;
  };

  const updateProj = fn => setProjects(ps => ps.map(p => p.id === selected ? fn(p) : p));
  const toggleTask  = tid => updateProj(p => ({ ...p, tasks: p.tasks.map(t => t.id === tid ? { ...t, done: !t.done } : t) }));
  const deleteTask  = tid => updateProj(p => ({ ...p, tasks: p.tasks.filter(t => t.id !== tid) }));
  const addTask = () => {
    if (!newTask.trim()) return;
    updateProj(p => ({ ...p, tasks: [...p.tasks, { id: Date.now().toString(), text: newTask.trim(), done: false, deadline: newDeadline }] }));
    setNewTask(""); setNewDeadline("");
  };
  const toggleReport = (rid) => updateProj(p => ({ ...p, reports: p.reports.map(r => r.id === rid ? { ...r, open: !r.open } : r) }));
  const toggleStep   = (rid, sid) => updateProj(p => ({ ...p, reports: p.reports.map(r => r.id === rid ? { ...r, steps: r.steps.map(s => s.id === sid ? { ...s, done: !s.done } : s) } : r) }));
  const setReportUrl = (rid, url) => updateProj(p => ({ ...p, reports: p.reports.map(r => r.id === rid ? { ...r, url } : r) }));

  const allItems = projects.flatMap(p => {
    if (p.tasks) return p.tasks.filter(t => t.deadline).map(t => ({ key: t.id, label: t.text, deadline: t.deadline, done: t.done, color: p.color, proj: p.title }));
    if (p.reports) return p.reports.flatMap(r => [
      { key: r.id + "_d", label: r.label + " 締切", deadline: r.deadline, done: r.steps[0]?.done, color: p.color, proj: p.title },
      { key: r.id + "_f", label: r.label + " 最終稿", deadline: r.finalDeadline, done: r.steps[3]?.done, color: p.color, proj: p.title },
    ]);
    return [];
  }).sort((a, b) => new Date(a.deadline) - new Date(b.deadline));

  const pct = calcPct(proj);

  const Sidebar = () => (
    <div style={{ width: 210, background: "#fff", borderRight: "1px solid #e5e7eb", padding: "20px 0", flexShrink: 0, display: "flex", flexDirection: "column" }}>
      <div style={{ display: "flex", margin: "0 14px 16px", background: "#f3f4f6", borderRadius: 8, padding: 3 }}>
        {["project","timeline"].map(v => (
          <button key={v} onClick={() => { setView(v); setMenuOpen(false); }} style={{ flex: 1, border: "none", borderRadius: 6, padding: "5px 0", fontSize: 11, fontWeight: 600, cursor: "pointer", background: view === v ? "#fff" : "transparent", color: view === v ? "#111" : "#9ca3af", boxShadow: view === v ? "0 1px 3px rgba(0,0,0,.1)" : "none" }}>
            {v === "project" ? "科目別" : "タイムライン"}
          </button>
        ))}
      </div>
      <div style={{ fontSize: 10, fontWeight: 700, color: "#9ca3af", letterSpacing: 1, padding: "0 18px 8px" }}>PROJECTS</div>
      {projects.map(p => {
        const pp = calcPct(p);
        const tot = p.tasks ? p.tasks.length : p.reports ? p.reports.reduce((a,r)=>a+r.steps.length,0) : 0;
        const dn  = p.tasks ? p.tasks.filter(t=>t.done).length : p.reports ? p.reports.reduce((a,r)=>a+r.steps.filter(s=>s.done).length,0) : 0;
        return (
          <div key={p.id} onClick={() => { setSelected(p.id); setView("project"); setMenuOpen(false); }} style={{ padding: "8px 18px", cursor: "pointer", borderLeft: selected === p.id && view === "project" ? `3px solid ${p.color}` : "3px solid transparent", background: selected === p.id && view === "project" ? "#f3f4f6" : "transparent" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: p.color, flexShrink: 0 }} />
              <span style={{ flex: 1, fontSize: 12, color: "#1f2937", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.title}</span>
              <span style={{ fontSize: 11, color: "#9ca3af" }}>{dn}/{tot}</span>
            </div>
            <div style={{ marginLeft: 15 }}><PBar pct={pp} color={p.color} /></div>
          </div>
        );
      })}
    </div>
  );

  return (
    <div style={{ fontFamily: "'Helvetica Neue', Arial, sans-serif", minHeight: "100vh", background: "#f9fafb" }}>
      {/* Mobile header */}
      <div style={{ display: "none", position: "sticky", top: 0, zIndex: 100, background: "#fff", borderBottom: "1px solid #e5e7eb", padding: "12px 16px", alignItems: "center", justifyContent: "space-between", id: "mobile-header" }}>
        <span style={{ fontWeight: 700, fontSize: 15, color: "#111" }}>修士課程 進捗トラッカー</span>
        <button onClick={() => setMenuOpen(o => !o)} style={{ background: "none", border: "1px solid #e5e7eb", borderRadius: 6, padding: "5px 10px", fontSize: 12, cursor: "pointer" }}>
          {menuOpen ? "✕ 閉じる" : "☰ メニュー"}
        </button>
      </div>

      <div style={{ display: "flex", minHeight: "100vh" }} id="main-layout">
        {/* Desktop sidebar */}
        <div id="desktop-sidebar"><Sidebar /></div>

        {/* Mobile drawer */}
        {menuOpen && (
          <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, zIndex: 200, display: "flex" }}>
            <div style={{ width: 240, background: "#fff", borderRight: "1px solid #e5e7eb", overflowY: "auto" }}>
              <div style={{ padding: "16px", borderBottom: "1px solid #e5e7eb", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontWeight: 700 }}>メニュー</span>
                <button onClick={() => setMenuOpen(false)} style={{ background: "none", border: "none", fontSize: 18, cursor: "pointer", color: "#6b7280" }}>✕</button>
              </div>
              <Sidebar />
            </div>
            <div style={{ flex: 1, background: "rgba(0,0,0,0.3)" }} onClick={() => setMenuOpen(false)} />
          </div>
        )}

        {/* Main content */}
        <div style={{ flex: 1, padding: "32px 36px", maxWidth: 700, overflowY: "auto" }} id="main-content">

          {view === "timeline" && (
            <div>
              <div style={{ fontSize: 18, fontWeight: 700, color: "#111", marginBottom: 20 }}>📅 締め切りタイムライン</div>
              {allItems.map(t => (
                <div key={t.key} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", background: t.done ? "#f9fafb" : "#fff", border: "1px solid #e5e7eb", borderLeft: `4px solid ${t.color}`, borderRadius: 8, marginBottom: 6, opacity: t.done ? 0.5 : 1 }}>
                  <span style={{ fontSize: 12, color: "#6b7280", width: 50, flexShrink: 0 }}>{t.deadline?.slice(5).replace("-", "/")}</span>
                  <DeadlineBadge deadline={t.deadline} />
                  <span style={{ flex: 1, fontSize: 13, color: "#1f2937", textDecoration: t.done ? "line-through" : "none" }}>
                    <span style={{ fontSize: 11, color: t.color, fontWeight: 600, marginRight: 6 }}>{t.proj.length > 10 ? t.proj.slice(0,10)+"…" : t.proj}</span>
                    {t.label}
                  </span>
                </div>
              ))}
            </div>
          )}

          {view === "project" && (
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
                <span style={{ width: 12, height: 12, borderRadius: "50%", background: proj.color, flexShrink: 0 }} />
                <div style={{ fontSize: 20, fontWeight: 700, color: "#111" }}>{proj.title}</div>
              </div>
              <PBar pct={pct} color={proj.color} />
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#6b7280", marginBottom: 20 }}>
                <span>進捗</span>
                <span style={{ fontWeight: 700, color: proj.color }}>{pct}%</span>
              </div>

              {isThesis && (
                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#9ca3af", letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 }}>リンク</div>
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                    <a href="https://www.myendnoteweb.com/EndNoteWeb.html" target="_blank" rel="noopener noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 13, color: proj.color, textDecoration: "none", background: "#fff", border: "1px solid #e5e7eb", borderRadius: 8, padding: "7px 14px" }}>🔗 EndNote Web</a>
                    <a href="https://docs.google.com/spreadsheets/d/1cIJRqCX5O-vT-tAwC5mpi9WARtgT6D0umUuBo27tXkg/edit?resourcekey=&gid=329566813#gid=329566813" target="_blank" rel="noopener noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 13, color: proj.color, textDecoration: "none", background: "#fff", border: "1px solid #e5e7eb", borderRadius: 8, padding: "7px 14px" }}>📊 アンケート結果</a>
                  </div>
                </div>
              )}

              {isThesis && (
                <div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#9ca3af", letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 }}>タスク</div>
                  {proj.tasks.map(t => (
                    <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 12px", borderRadius: 8, background: t.done ? "#f9fafb" : "#fff", border: "1px solid #e5e7eb", marginBottom: 5, opacity: t.done ? 0.55 : 1 }}>
                      <input type="checkbox" checked={t.done} onChange={() => toggleTask(t.id)} style={{ width: 15, height: 15, accentColor: proj.color, flexShrink: 0 }} />
                      <span style={{ flex: 1, fontSize: 13, color: t.done ? "#9ca3af" : "#1f2937", textDecoration: t.done ? "line-through" : "none" }}>{t.text}</span>
                      {t.deadline && <DeadlineBadge deadline={t.deadline} />}
                      <button onClick={() => deleteTask(t.id)} style={{ background: "none", border: "none", color: "#d1d5db", cursor: "pointer", fontSize: 15, padding: "0 2px" }}>×</button>
                    </div>
                  ))}
                  <div style={{ display: "flex", gap: 8, marginTop: 8, flexWrap: "wrap" }}>
                    <input value={newTask} onChange={e => setNewTask(e.target.value)} onKeyDown={e => e.key === "Enter" && addTask()} placeholder="新しいタスク…" style={{ flex: 1, minWidth: 120, border: "1px solid #e5e7eb", borderRadius: 8, padding: "8px 12px", fontSize: 13, outline: "none" }} />
                    <input type="date" value={newDeadline} onChange={e => setNewDeadline(e.target.value)} style={{ border: "1px solid #e5e7eb", borderRadius: 8, padding: "8px 10px", fontSize: 13, outline: "none", color: "#374151" }} />
                    <button onClick={addTask} style={{ background: proj.color, color: "#fff", border: "none", borderRadius: 8, padding: "8px 16px", fontSize: 13, cursor: "pointer", fontWeight: 600 }}>追加</button>
                  </div>
                </div>
              )}

              {!isThesis && (
                <div>
                  {proj.id === "c1" && <SyllabusPanel title="異文化間コミュニケーション論" color={proj.color} sections={SYLLABUS_C1} />}
                  {proj.id === "c3" && <SyllabusPanel title="日本語教育方法論" color={proj.color} sections={SYLLABUS_C3} />}
                  {proj.id === "c4" && <SyllabusPanel title="言語教育工学" color={proj.color} sections={SYLLABUS_C4} />}
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#9ca3af", letterSpacing: 1, textTransform: "uppercase", margin: "20px 0 8px" }}>レポート</div>
                  {proj.reports.map(r => {
                    const doneCnt = r.steps.filter(s => s.done).length;
                    const rPct = Math.round(doneCnt / r.steps.length * 100);
                    return (
                      <div key={r.id} style={{ border: "1px solid #e5e7eb", borderRadius: 10, marginBottom: 10, overflow: "hidden", background: "#fff" }}>
                        <div onClick={() => toggleReport(r.id)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 14px", cursor: "pointer", background: r.open ? "#fafafa" : "#fff" }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                              <span style={{ fontSize: 13, fontWeight: 600, color: "#1f2937" }}>{r.label}</span>
                              <span style={{ fontSize: 11, color: "#6b7280" }}>締切 {r.deadline?.slice(5).replace("-", "/")}</span>
                              <DeadlineBadge deadline={r.deadline} />
                            </div>
                            <PBar pct={rPct} color={proj.color} />
                            <span style={{ fontSize: 11, color: "#9ca3af" }}>{doneCnt}/{r.steps.length} ステップ完了　／　最終稿 {r.finalDeadline?.slice(5).replace("-", "/")}</span>
                          </div>
                          <span style={{ fontSize: 12, color: "#9ca3af" }}>{r.open ? "▲" : "▼"}</span>
                        </div>
                        {r.open && (
                          <div style={{ padding: "8px 14px 12px", borderTop: "1px solid #f3f4f6" }}>
                            {r.steps.map((s, i) => (
                              <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 0", borderBottom: i < r.steps.length - 1 ? "1px solid #f9fafb" : "none" }}>
                                <input type="checkbox" checked={s.done} onChange={() => toggleStep(r.id, s.id)} style={{ width: 15, height: 15, accentColor: proj.color, flexShrink: 0 }} />
                                <span style={{ flex: 1, fontSize: 13, color: s.done ? "#9ca3af" : "#374151", textDecoration: s.done ? "line-through" : "none" }}>
                                  <span style={{ fontSize: 11, color: "#d1d5db", marginRight: 6 }}>{i + 1}.</span>{s.text}
                                </span>
                                {i === 3 && <DeadlineBadge deadline={r.finalDeadline} />}
                              </div>
                            ))}
                            <div style={{ marginTop: 10 }}>
                              {r.url ? (
                                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                                  <a href={r.url} target="_blank" rel="noopener noreferrer" style={{ flex: 1, fontSize: 12, color: proj.color, textDecoration: "none", background: "#f9fafb", border: "1px solid #e5e7eb", borderRadius: 6, padding: "5px 10px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", display: "block" }}>
                                    📄 {r.url.replace("https://","").slice(0,45)}…
                                  </a>
                                  <button onClick={() => setReportUrl(r.id, "")} style={{ background: "none", border: "none", color: "#d1d5db", cursor: "pointer", fontSize: 14 }}>×</button>
                                </div>
                              ) : (
                                <input placeholder="Google Drive URL を貼り付け…" onBlur={e => { if (e.target.value) setReportUrl(r.id, e.target.value); e.target.value = ""; }} style={{ width: "100%", border: "1px solid #e5e7eb", borderRadius: 6, padding: "6px 10px", fontSize: 12, outline: "none", boxSizing: "border-box" }} />
                              )}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}

              <div style={{ marginTop: 24 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#9ca3af", letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 }}>メモ</div>
                <textarea value={proj.memo} onChange={e => updateProj(p => ({ ...p, memo: e.target.value }))} placeholder="メモ・参考資料・フィードバックなど…" style={{ width: "100%", border: "1px solid #e5e7eb", borderRadius: 8, padding: "10px 12px", fontSize: 13, resize: "vertical", minHeight: 72, outline: "none", fontFamily: "inherit", boxSizing: "border-box", color: "#374151" }} />
              </div>

              {isThesis && <WritingGuide color={proj.color} />}
              <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 12 }}>{saving ? "保存中…" : "✓ 保存済み"}</div>
            </div>
          )}
        </div>
      </div>

      <style>{`
        @media (max-width: 640px) {
          #mobile-header { display: flex !important; }
          #desktop-sidebar { display: none !important; }
          #main-content { padding: 20px 16px !important; }
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
