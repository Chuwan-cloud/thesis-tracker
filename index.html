<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Thesis Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#E8E4DA;display:flex;min-height:100vh;color:#1f2937;}
input,textarea,button,select{font-family:inherit;}

/* ── Sidebar ── */
#sidebar{width:200px;background:#3D348B;flex-shrink:0;height:100vh;position:sticky;top:0;display:flex;flex-direction:column;overflow:hidden;}
.sb-header{padding:24px 18px 16px;}
.sb-title{font-size:14px;font-weight:800;color:#fff;line-height:1.3;}
.sb-sub{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px;letter-spacing:.3px;}
.sb-nav{padding:8px 10px;flex:1;}
.sb-btn{display:flex;align-items:center;gap:9px;width:100%;border:none;background:transparent;padding:9px 10px;border-radius:8px;font-size:12px;font-weight:600;color:rgba(255,255,255,.65);cursor:pointer;text-align:left;transition:background .15s;}
.sb-btn:hover{background:rgba(255,255,255,.1);}
.sb-btn.active{background:rgba(255,255,255,.18);color:#fff;}
.sb-btn svg{flex-shrink:0;opacity:.8;}
.sb-divider{height:1px;background:rgba(255,255,255,.1);margin:8px 10px;}

/* ── Main ── */
#main{flex:1;padding:28px 28px;overflow-y:auto;max-width:900px;}

/* ── Cards ── */
.card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden;}
.card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}

/* ── Subject cards ── */
.subj-card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:14px 16px;cursor:pointer;transition:box-shadow .15s;}
.subj-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);}
.subj-title{font-size:13px;font-weight:700;color:#1f2937;margin-bottom:2px;}
.subj-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:#f3f4f6;color:#6b7280;}
.subj-row{display:flex;align-items:center;gap:6px;margin-top:8px;}
.r-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.r-dot.done{color:#fff;}
.r-dot.pending{background:#f3f4f6;color:#9ca3af;}

/* ── Today bar ── */
.today-bar{background:#fff5f8;border:1px solid #f0d0dd;border-radius:12px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;}
.today-bar-icon{font-size:18px;}
.today-bar-content{flex:1;}
.today-bar-title{font-size:12px;font-weight:700;color:#6E1E3A;margin-bottom:2px;}
.today-bar-items{font-size:12px;color:#374151;}

/* ── Progress section ── */
.proj-block{background:#fff;border-radius:12px;border:1px solid #e5e7eb;margin-bottom:10px;overflow:hidden;}
.proj-block-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;}
.proj-block-head:hover{background:#fafafa;}
.proj-block-color{width:4px;border-radius:99px;align-self:stretch;min-height:36px;flex-shrink:0;}
.proj-block-info{flex:1;}
.proj-block-title{font-size:14px;font-weight:700;color:#1f2937;}
.proj-block-sub{font-size:11px;color:#6b7280;margin-top:1px;}
.proj-block-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;}
.proj-block-arr{font-size:11px;color:#9ca3af;}
.proj-block-body{border-top:1px solid #f3f4f6;padding:12px 16px 14px 32px;}

/* ── Task rows ── */
.tk-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f5f5f5;}
.tk-row:last-child{border-bottom:none;}
.tk-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;flex-shrink:0;}
.tk-label{flex:1;font-size:13px;color:#374151;line-height:1.4;}
.tk-label.done{text-decoration:line-through;color:#9ca3af;}

/* ── Report rows ── */
.rp-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f5f5f5;}
.rp-row:last-child{border-bottom:none;}
.rp-num{font-size:12px;font-weight:700;color:#9ca3af;width:24px;flex-shrink:0;}
.rp-steps{display:flex;gap:4px;}
.rp-step{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;cursor:pointer;border:1.5px solid #e5e7eb;background:#fff;color:#9ca3af;transition:all .15s;}
.rp-step.done{color:#fff;border-color:transparent;}

/* Pbar */
.pbar-wrap{background:#e5e7eb;border-radius:99px;height:4px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:99px;transition:width .4s;}

/* Badge */
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;white-space:nowrap;}

/* ── Accordion ── */
.acc-btn{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:9px 14px;font-size:12px;cursor:pointer;color:#374151;font-weight:600;width:100%;user-select:none;margin-top:8px;}
.acc-btn.open{border-radius:8px 8px 0 0;}
.acc-inner{border:1px solid #e5e7eb;border-top:none;border-radius:0 0 8px 8px;background:#fff;}
.sec-btn{width:100%;text-align:left;background:none;border:none;padding:10px 14px;font-size:12px;font-weight:700;color:#374151;cursor:pointer;display:flex;justify-content:space-between;}

/* ── Subtask ── */
.st-item{border:1px solid #e5e7eb;border-radius:8px;margin-bottom:5px;}
.st-head{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;user-select:none;}
.st-body{padding:8px 12px 12px;border-top:1px solid #f3f4f6;}
.child-row{border:1px solid #e5e7eb;border-radius:8px;margin-bottom:4px;}
.child-head{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;user-select:none;}
.child-body{padding:6px 12px 10px 36px;}

/* ── Resources ── */
.res-entry{display:flex;align-items:center;gap:6px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:7px;padding:5px 8px;margin-bottom:4px;}
.res-entry-link{font-size:12px;text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.res-entry-name{flex:1;font-size:12px;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.res-del-btn{background:none;border:none;color:#d1d5db;cursor:pointer;font-size:15px;padding:0 2px;flex-shrink:0;}
.res-del-btn:hover{color:#ef4444;}
.res-add-row{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.res-add-input{flex:1;min-width:80px;border:1px solid #e5e7eb;border-radius:6px;padding:5px 8px;font-size:12px;outline:none;color:#374151;background:#fff;}
.res-add-btn{border:none;border-radius:6px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;}
.res-tab{border:1px solid #e5e7eb;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:#6b7280;}

/* ── Schedule ── */
.sch-seg{background:#fff;border-radius:12px;border:1px solid #e5e7eb;margin-bottom:8px;overflow:hidden;}
.sch-seg-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;}
.sch-seg-head:hover{background:#fafafa;}
.sch-wk-head{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;background:#f7f7f7;border-bottom:1px solid #f0f0f0;}
.sch-wk-head:hover{background:#f0f0f0;}
.sch-task{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid #f5f5f5;}
.sch-task:last-child{border-bottom:none;}
.sch-task input{width:15px;height:15px;flex-shrink:0;margin-top:1px;cursor:pointer;}
.sch-task-t{font-size:13px;color:#374151;flex:1;line-height:1.4;}
.sch-task-t.done{text-decoration:line-through;color:#9ca3af;}
.sch-dead-bar{display:flex;align-items:center;gap:8px;padding:7px 14px;background:#f5eaf0;font-size:12px;font-weight:700;color:#6E1E3A;border-bottom:1px solid #e8c8d8;border-left:4px solid #6E1E3A;}
.sch-phase{display:flex;align-items:center;gap:10px;margin:20px 0 8px;}
.sch-phase-line{flex:1;height:1px;background:#e5e7eb;}
.sch-phase-label{font-size:10px;font-weight:700;color:#9ca3af;letter-spacing:.8px;white-space:nowrap;text-transform:uppercase;}

/* ── Timeline ── */
.tl-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;border-radius:8px;border:1px solid #f0f0f0;margin-bottom:6px;}

/* ── Misc ── */
.slbl{font-size:10px;font-weight:700;color:#374151;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.memo-area{width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;font-size:13px;resize:vertical;min-height:72px;outline:none;color:#374151;}
.add-input{flex:1;min-width:80px;border:1px solid #e5e7eb;border-radius:8px;padding:7px 10px;font-size:12px;outline:none;}
.link-btn{display:flex;align-items:center;gap:6px;font-size:12px;text-decoration:none;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:7px 12px;color:inherit;}
.url-input{width:100%;border:1px solid #e5e7eb;border-radius:6px;padding:6px 10px;font-size:12px;outline:none;}
</style>
</head>
<body>
<!-- ── SIDEBAR ── -->
<div id="sidebar">
  <div class="sb-header">
    <div style="font-size:15px;font-weight:800;color:#fff;line-height:1.3;letter-spacing:-.2px;">Thesis &amp; Reports Tracker</div>

<div id="main"></div>

function calcPct(p){if(p.tasks){const a=[...p.tasks,...(p.subtasks||[])];return a.length?Math.round(a.filter(t=>t.done).length/a.length*100):0;}if(p.reports){const tot=p.reports.reduce((a,r)=>a+r.steps.length,0),dn=p.reports.reduce((a,r)=>a+r.steps.filter(s=>s.done).length,0);return tot?Math.round(dn/tot*100):0;}return 0;}

function migrateData(ps){
  return ps.map(p=>{
    let np={...p};
    if(PALETTE[np.id])np={...np,color:PALETTE[np.id]};
    if(np.reports)np={...np,reports:np.reports.map(r=>({...r,label:LABEL_MAP[r.label]||r.label,urls:r.urls||[],pdfs:r.pdfs||[],words:r.words||[]}))};
    if(np.subtasks)np={...np,subtasks:np.subtasks.map(s=>{if(!s.isLiterature||!s.children)return s;return{...s,children:s.children.map(c=>{if(!c.urls){const urls=c.url?[{id:uid(),href:c.url,label:""}]:[];const{url,...rest}=c;return{...rest,urls,pdfs:c.pdfs||[],words:c.words||[]};}return{...c,words:c.words||[]};})};})};

}

function updateSidebar(){

}

function updateSchStats(){
  const all=SCH_PHASES.flatMap(p=>p.segs.flatMap(s=>s.weeks.flatMap(w=>w.tasks)));
  const done=all.filter(t=>schCk[t.id]).length;
  const pct=Math.round(done/all.length*100);
  const pb=document.getElementById("sch-tot-bar");if(pb)pb.querySelector(".pbar-fill").style.width=pct+"%";
  const pp=document.getElementById("sch-tot-pct");if(pp)pp.textContent=pct+"%";
  SCH_PHASES.forEach(ph=>ph.segs.forEach(s=>{

// ── RESOURCE HTML ──────────────────────────────────────
function resHtml(item,col,prefix,addUrlFn,delUrlFn,addFileFn,delPdfFn,delWordFn,openPdfFn,dlWordFn){
  const urls=item.urls||[],pdfs=item.pdfs||[],words=item.words||[];
  const tab=(prefix==="rep"?repTabState:prefix==="lit"?litTabState:stTabState)[item.id]||"url";
  const fc=pdfs.length+words.length,tc=urls.length+fc;
  const cb=tc>0?`<span style="font-size:10px;font-weight:700;background:${col};color:#fff;border-radius:99px;padding:1px 5px;margin-left:4px;">${tc}</span>`:"";
  const tabBtn=(t,lbl,cnt)=>{const active=tab===t;const c2=cnt>0?`<span style="font-size:9px;background:${active?"rgba(255,255,255,.35)":col};color:#fff;border-radius:99px;padding:0 4px;margin-left:2px;">${cnt}</span>`:"";return `<button id="${prefix}tab-${t}-${item.id}" class="res-tab" style="background:${active?col:"#fff"};color:${active?"#fff":"#6b7280"};border-color:${active?col:"#e5e7eb"};" onclick="${prefix==="rep"?`setRepTab`:`set${prefix.charAt(0).toUpperCase()+prefix.slice(1)}Tab`}('${item.id}','${t}')">${lbl}${c2}</button>`;};
  const ue=urls.map(u=>`<div class="res-entry"><a href="${esc(u.href)}" target="_blank" class="res-entry-link" style="color:${col};">${esc(u.label||u.href.slice(0,45))}</a><button class="res-del-btn" onclick="${delUrlFn}('${item.id}','${u.id}')">×</button></div>`).join("");
  const ua=`<div class="res-add-row"><input id="${prefix}urllabel-${item.id}" class="res-add-input" placeholder="Label" style="width:90px;flex:none;"><input id="${prefix}urlinput-${item.id}" class="res-add-input" placeholder="https://…"><button class="res-add-btn" style="background:${col};color:#fff;" onclick="${addUrlFn}('${item.id}')">Add</button></div>`;
  const pe=pdfs.map(p=>`<div class="res-entry"><span class="res-entry-name" style="cursor:pointer;color:${col};" onclick="${openPdfFn}('${item.id}','${p.id}')">${esc(p.name)}</span><button class="res-del-btn" onclick="${delPdfFn}('${item.id}','${p.id}')">×</button></div>`).join("");
  const we=words.map(w=>`<div class="res-entry"><span class="res-entry-name" style="cursor:pointer;color:${col};" onclick="${dlWordFn}('${item.id}','${w.id}')">${esc(w.name)}</span><button class="res-del-btn" onclick="${delWordFn}('${item.id}','${w.id}')">×</button></div>`).join("");
  const fa=`<div class="res-add-row"><input id="${prefix}fileinput-${item.id}" type="file" accept="application/pdf,.doc,.docx" style="display:none;" onchange="${addFileFn}('${item.id}')"><button class="res-add-btn" style="background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;" onclick="document.getElementById('${prefix}fileinput-${item.id}').click()">Choose file…</button></div>`;
  return `<div style="margin-top:8px;border-top:1px solid #f3f4f6;padding-top:8px;"><div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;"><span style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:1px;">Resources</span>${cb}<div style="margin-left:auto;display:flex;gap:3px;">${tabBtn("url","URL",urls.length)}${tabBtn("file","File",fc)}</div></div><div id="${prefix}url-sec-${item.id}" style="display:${tab==="url"?"block":"none"};">${ue}${ua}</div><div id="${prefix}file-sec-${item.id}" style="display:${tab==="file"?"block":"none"};">${pe}${we}${fa}</div></div>`;
}
const repResHtml=(r,col)=>resHtml(r,col,"rep","addRepUrl","delRepUrl","addRepFile","delRepPdf","delRepWord","openRepPdf","downloadRepWord");

ght:700;background:${col};color:#fff;border-radius:99px;padding:1px 5px;margin-right:4px;">${tR}</span>`:"";return `<div style="margin-bottom:5px;"><div style="border:1px solid #e5e7eb;border-radius:8px;background:#fff;"><div id="stwrap-${s.id}" onclick="toggleParent('${s.id}')" style="display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;user-select:none;"><span id="stbul-${s.id}" style="width:20px;height:20px;border-radius:50%;background:${s.done?col:"#e5e7eb"};color:${s.done?"#fff":"#6b7280"};font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${idx+1}</span><span id="stlbl-${s.id}" style="flex:1;font-size:13px;color:${s.done?"#9ca3af":"#1f2937"};text-decoration:${s.done?"line-through":"none"};">${esc(s.text)}</span><span style="font-size:11px;color:#9ca3af;margin-right:4px;">${cd}/${s.children.length}</span>${rb}<span id="par-arrow-${s.id}" style="font-size:11px;color:#9ca3af;">${s.open?"▲":"▼"}</span></div></div><div id="children-${s.id}" style="margin-left:20px;border-left:2px solid #e5e7eb;padding-left:10px;margin-top:3px;display:${s.open?"block":"none"};">${ch}</div></div>`;}

// ── RENDER: DASHBOARD ──────────────────────────────────
function renderDash(){
  const now=new Date();
  // upcoming deadlines (next 14 days)
  const upcoming=[];
  projects.forEach(p=>{
    if(p.tasks)p.tasks.filter(t=>!t.done&&t.deadline).forEach(t=>{const d=daysLeft(t.deadline);if(d!==null&&d<=14&&d>=0)upcoming.push({label:t.text,deadline:t.deadline,color:p.color,proj:p.title});});
    if(p.reports)p.reports.forEach(r=>{[{dl:r.deadline,lbl:r.label.replace(/〈前期〉|〈後期〉/g,"").trim()+" Draft",done:r.steps[0]?.done},{dl:r.finalDeadline,lbl:r.label.replace(/〈前期〉|〈後期〉/g,"").trim()+" Final",done:r.steps[3]?.done}].forEach(({dl,lbl,done})=>{if(!done&&dl){const d=daysLeft(dl);if(d!==null&&d<=14&&d>=0)upcoming.push({label:lbl,deadline:dl,color:p.color,proj:p.title});}});});
  });
  upcoming.sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));

  let h=`<div style="font-size:20px;font-weight:800;color:#111;margin-bottom:20px;">Dashboard</div>`;

  // today bar
  if(upcoming.length>0){
    h+=`<div class="today-bar">
      <div class="today-bar-icon">📋</div>
      <div class="today-bar-content">
        <div class="today-bar-title">今後2週間の締切 <span style="font-size:11px;font-weight:700;background:#6E1E3A;color:#fff;border-radius:99px;padding:1px 7px;margin-left:4px;">${upcoming.length}件</span></div>
        <div class="today-bar-items">${upcoming.slice(0,3).map(u=>`<span style="margin-right:12px;color:#374151;">${u.deadline.slice(5).replace("-","/")} <span style="color:${u.color};font-weight:600;">${esc(u.label)}</span></span>`).join("")}${upcoming.length>3?`<span style="color:#9ca3af;font-size:11px;">他${upcoming.length-3}件</span>`:""}</div>
      </div>
    </div>`;
  }

  // subject cards 2-col
  const courseProjects=projects.filter(p=>p.reports);
  h+=`<div class="grid-2">`;
  courseProjects.forEach(p=>{
    const pct=calcPct(p);
    const stepLabels=["D","F","P","✓"];
    // use #A4BDE0 for text on light-colored subjects (c2=#C9D763, c4=#E9B0C8)
    const titleCol="#374151";
    h+=`<div class="subj-card" onclick="selectSubject('${p.id}')">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <div class="subj-title" style="color:${titleCol};">${esc(p.title)}</div>
      </div>
      <div style="font-size:11px;color:#9ca3af;margin-bottom:6px;">${pbar(pct,p.color)}</div>`;
    p.reports.forEach(r=>{
      const rShort=r.label.replace(/〈前期〉|〈後期〉/g,"").trim();
      const allDone=r.steps.every(s=>s.done);
      h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
        <span style="font-size:11px;font-weight:600;color:#6b7280;width:28px;flex-shrink:0;">${esc(rShort)}</span>
        <div style="display:flex;gap:3px;">`;
      r.steps.forEach((s,i)=>{
        const bgC=s.done?p.color:"#f3f4f6";
        const tc=s.done?"#fff":"#9ca3af";
        h+=`<div class="r-dot" style="background:${bgC};color:${tc};">${stepLabels[i]}</div>`;
      });
      h+=`</div>`;
      if(!allDone){const nextDead=r.steps[0]?.done?r.finalDeadline:r.deadline;if(nextDead)h+=badge(nextDead);}
      h+=`</div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;

  // thesis progress block
  const thesis=projects.find(p=>p.id==="thesis");
  if(thesis){
    const pct=calcPct(thesis);
    const pendingTasks=thesis.tasks.filter(t=>!t.done);
    h+=`<div style="font-size:12px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">Progress</div>`;
    h+=`<div class="proj-block">
      <div class="proj-block-head" onclick="selectSubject('thesis')">
        <div class="proj-block-color" style="background:${thesis.color};"></div>
        <div class="proj-block-info">
          <div class="proj-block-title">${esc(thesis.title)}</div>
          ${pbar(pct,thesis.color,"proj-pbar-thesis")}
        </div>
        <span id="proj-pct-thesis" class="proj-block-badge" style="background:${thesis.color}15;color:${thesis.color};">${pct}%</span>
      </div>
    </div>`;
    // report progress per course
    courseProjects.forEach(p=>{
      const pct2=calcPct(p);
      const nextR=p.reports.find(r=>!r.steps.every(s=>s.done));
      const nextInfo=nextR?`${nextR.label.replace(/〈前期〉|〈後期〉/g,"").trim()} — ${nextR.steps.find(s=>!s.done)?.text||""}`:"完了";
      h+=`<div class="proj-block" style="margin-bottom:8px;">
        <div class="proj-block-head" onclick="selectSubject('${p.id}')">
          <div class="proj-block-color" style="background:${p.color};"></div>
          <div class="proj-block-info">
            <div class="proj-block-title">${esc(p.title)}</div>
            <div class="proj-block-sub">${esc(nextInfo)}</div>
            ${pbar(pct2,p.color,`proj-pbar-${p.id}`)}
          </div>
          <span id="proj-pct-${p.id}" class="proj-block-badge" style="background:${p.color}22;color:${p.color};">${pct2}%</span>
        </div>
      </div>`;
    });
  }
  h+=`<div id="save-status" style="font-size:11px;color:#9ca3af;margin-top:16px;">✓ Saved</div>`;
  return h;
}

// ── RENDER: SUBJECT ────────────────────────────────────
function renderSubject(){
  const proj=getProj(),isThesis=proj.id==="thesis",pct=calcPct(proj),col=proj.color;
  let h=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
    <span style="width:12px;height:12px;border-radius:50%;background:${col};flex-shrink:0;"></span>
    <div style="font-size:20px;font-weight:800;color:#111;">${esc(proj.title)}</div>
  </div>
  ${pbar(pct,col,"proj-pbar-"+proj.id)}
  <div style="display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:20px;"><span>Progress</span><span id="proj-pct-${proj.id}" style="font-weight:700;color:${col};">${pct}%</span></div>`;

  if(isThesis){
    h+=`<div style="display:flex;gap:20px;align-items:flex-start;">
    <div style="flex:1;min-width:0;">`;
    ["研究内容","Research"].forEach(group=>{
      const items=proj.subtasks.filter(s=>s.group===group);
      const allSub=items.flatMap(s=>s.children?[s,...s.children]:[s]);
      const dn=allSub.filter(s=>s.done).length;
      const label=group==="研究内容"?"Outline":"Research";
      h+=`<div style="margin-bottom:20px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <span class="slbl" style="margin:0;">${label}</span>
          <div style="flex:1;height:1px;background:#e5e7eb;"></div>
          <span style="font-size:11px;color:#9ca3af;">${dn}/${items.length}</span>
        </div>`;
      items.forEach((s,idx)=>{if(s.isParent)h+=parentHtml(s,idx,col,!!s.isLiterature);else h+=stItemHtml(s,idx,col,group==="Research");});
      h+=`</div>`;
    });
    h+=`<div><div class="slbl">Memo</div><textarea class="memo-area" placeholder="Notes…" oninput="updateMemo('${proj.id}',this.value)">${esc(proj.memo||"")}</textarea></div>
    </div>
    <div style="width:260px;flex-shrink:0;">
      <div class="slbl">Links</div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px;">
        <a href="https://www.myendnoteweb.com/EndNoteWeb.html" target="_blank" class="link-btn" style="color:#374151;">EndNote Web</a>
        <a href="https://docs.google.com/spreadsheets/d/1cIJRqCX5O-vT-tAwC5mpi9WARtgT6D0umUuBo27tXkg/edit?resourcekey=&gid=329566813#gid=329566813" target="_blank" class="link-btn" style="color:#374151;">アンケート結果</a>
      </div>
      ${accordionHtml("guide","覚書：レポート・修論の書き方",GUIDE_SECTIONS,"400")}
      <div style="margin-top:20px;">
        <div class="slbl">Tasks</div>
        <div id="task-list">${proj.tasks.map(t=>taskRowHtml(t,col)).join("")}</div>
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
          <input id="new-task-input" class="add-input" placeholder="New task…" onkeydown="if(event.key==='Enter')addTask();">
          <input id="new-deadline-input" type="date" style="border:1px solid #e5e7eb;border-radius:8px;padding:7px 8px;font-size:12px;outline:none;color:#374151;">
          <button onclick="addTask()" style="background:${col};color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-weight:600;">Add</button>
        </div>
      </div>
    </div></div>`;
  } else {
    if(SYLLABUS[proj.id])h+=accordionHtml("syl-"+proj.id,"Syllabus",SYLLABUS[proj.id].sections);
    h+=`<div class="slbl" style="margin-top:20px;">Reports</div>`;
    ["前期","後期"].forEach(sem=>{
      const semR=proj.reports.filter(r=>r.label.includes(`〈${sem}〉`));if(!semR.length)return;
      h+=`<div style="margin-bottom:4px;"><div style="display:flex;align-items:center;gap:8px;margin:12px 0 6px;"><span style="font-size:12px;font-weight:700;color:${col};">〈${sem}〉</span><div style="flex:1;height:1px;background:#e5e7eb;"></div></div>`;
      semR.forEach(r=>{
        const dn=r.steps.filter(s=>s.done).length,rPct=Math.round(dn/r.steps.length*100);
        const sl=r.label.replace(/〈前期〉|〈後期〉/g,"").trim();
        const totRes=(r.urls||[]).length+(r.pdfs||[]).length;
        const rb=totRes>0?`<span style="font-size:10px;font-weight:700;background:${col};color:#fff;border-radius:99px;padding:1px 5px;margin-left:4px;">📎${totRes}</span>`:"";
        h+=`<div class="proj-block" style="margin-bottom:8px;">
          <div class="proj-block-head" onclick="toggleReport('${r.id}')">
            <div class="proj-block-color" style="background:${col};"></div>
            <div class="proj-block-info">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                <span style="font-size:13px;font-weight:700;color:#1f2937;">${esc(sl)}</span>${rb}
                <span style="font-size:11px;color:#6b7280;">Draft ${r.deadline?.slice(5).replace("-","/")}</span>${badge(r.deadline)}
              </div>
              ${pbar(rPct,col,"rbar-"+r.id)}
              <span id="rprog-${r.id}" style="font-size:11px;color:#9ca3af;">${dn}/${r.steps.length} 完了　Final: ${r.finalDeadline?.slice(5).replace("-","/")}</span>
            </div>
            <span id="rarrow-${r.id}" style="font-size:12px;color:#9ca3af;">${r.open?"▲":"▼"}</span>
          </div>
          <div id="rbody-${r.id}" style="display:${r.open?"block":"none"};padding:10px 16px 14px 20px;border-top:1px solid #f3f4f6;">`;
        r.steps.forEach((s,i)=>{h+=`<div id="step-${s.id}" class="tk-row"><input type="checkbox" ${s.done?"checked":""} onchange="toggleStep('${r.id}','${s.id}')" style="accent-color:${col};"><span class="tk-label${s.done?" done":""}">${esc(s.text)}</span>${i===3?badge(r.finalDeadline):""}</div>`;});
        h+=`<div id="repres-${r.id}">${repResHtml(r,col)}</div></div></div>`;
      });
      h+=`</div>`;
    });
    h+=`<div style="margin-top:20px;"><div class="slbl">Memo</div><textarea class="memo-area" placeholder="Notes…" oninput="updateMemo('${proj.id}',this.value)">${esc(proj.memo||"")}</textarea></div>`;
  }
  h+=`<div id="save-status" style="font-size:11px;color:#9ca3af;margin-top:16px;">✓ Saved</div>`;
  return h;
}

// ── RENDER: TIMELINE ───────────────────────────────────
function renderTimeline(){
  const hd=document.getElementById("hide-done-chk"),hideDone=hd?hd.checked:true;
  const all=projects.flatMap(p=>{
    if(p.tasks)return p.tasks.filter(t=>t.deadline).map(t=>({key:t.id,label:t.text,deadline:t.deadline,done:t.done,color:p.color,proj:p.title,type:"task"}));
    if(p.reports)return p.reports.flatMap(r=>[
      {key:r.id+"_d",label:r.label.replace(/〈前期〉|〈後期〉/g,"").trim(),deadline:r.deadline,done:r.steps[0]?.done,color:p.color,proj:p.title,type:"draft"},
      {key:r.id+"_f",label:r.label.replace(/〈前期〉|〈後期〉/g,"").trim(),deadline:r.finalDeadline,done:r.steps[3]?.done,color:p.color,proj:p.title,type:"final"},
    ]);
    return[];
  }).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const filtered=hideDone?all.filter(t=>!t.done):all;
  const groups={};filtered.forEach(t=>{const k=t.deadline?.slice(0,7)||"未定";if(!groups[k])groups[k]=[];groups[k].push(t);});
  const now=new Date(),cm=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const sem=k=>{const m=parseInt(k.split("-")[1]);if(m>=6&&m<=9)return "前期";if(m>=10||m<=1)return "後期";return "";};
  const ml=k=>{if(k==="未定")return "TBD";const[y,m]=k.split("-");const s=sem(k);return `<span style="font-size:10px;color:#9ca3af;font-weight:600;">${s}</span> <span style="font-size:14px;font-weight:700;color:#111;">${y}年${parseInt(m)}月</span>`;};  const typeChip=type=>{
    if(type==="draft")return `<span style="font-size:10px;font-weight:700;color:#374151;background:#e5e7eb;border-radius:4px;padding:1px 6px;flex-shrink:0;">Draft</span>`;
    if(type==="final")return `<span style="font-size:10px;font-weight:700;color:#374151;background:#e5e7eb;border-radius:4px;padding:1px 6px;flex-shrink:0;">Final</span>`;
    return "";
  };
  const total=all.length,done=all.filter(t=>t.done).length,pct=total?Math.round(done/total*100):0;
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
    <div style="font-size:20px;font-weight:800;color:#111;">Tasks &amp; Deadlines</div>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280;cursor:pointer;">
      <input type="checkbox" id="hide-done-chk" ${hideDone?"checked":""} onchange="toggleTimelineDone()" style="accent-color:${PALETTE.thesis};">完了済みを隠す
    </label>
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
    <div style="flex:1;">${pbar(pct,PALETTE.thesis)}</div>
    <span style="font-size:11px;color:#6b7280;white-space:nowrap;">${done}/${total} 完了</span>
  </div>`;
  if(!filtered.length)return h+`<div style="text-align:center;padding:60px 0;color:#9ca3af;">All done! 🎉</div>`;
  Object.keys(groups).forEach(mo=>{
    const isCur=mo===cm;
    h+=`<div style="margin-bottom:24px;">
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid ${isCur?PALETTE.thesis:"#e5e7eb"};">
        ${isCur?`<span style="font-size:11px;font-weight:700;color:${PALETTE.thesis};">▶</span>`:""}
        <div>${ml(mo)}</div>
        <span style="font-size:11px;color:#9ca3af;margin-left:auto;">${groups[mo].length}件</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;">`;
    groups[mo].forEach(t=>{
      const sp=t.proj.length>12?t.proj.slice(0,12)+"…":t.proj;
      h+=`<div class="tl-item" style="opacity:${t.done?0.45:1};">
        <span style="font-size:12px;font-weight:700;color:#9ca3af;width:22px;text-align:right;flex-shrink:0;">${t.deadline?.slice(8)}</span>
        <span style="width:3px;height:26px;border-radius:99px;background:${t.color};flex-shrink:0;"></span>
        <div style="flex:1;min-width:0;">
          <div style="font-size:12px;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:${t.done?"line-through":"none"};">${esc(t.label)}</div>
          <div style="font-size:11px;color:#374151;font-weight:600;">${esc(sp)}</div>
        </div>
        ${typeChip(t.type)}
        ${badge(t.deadline)}
      </div>`;
    });
    h+=`</div></div>`;
  });
  return h;
}

// ── RENDER: SCHEDULE ───────────────────────────────────
function renderSchedule(){
  const allT=SCH_PHASES.flatMap(p=>p.segs.flatMap(s=>s.weeks.flatMap(w=>w.tasks)));
  const totDone=allT.filter(t=>schCk[t.id]).length;
  const totPct=Math.round(totDone/allT.length*100);
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
    <div style="font-size:20px;font-weight:800;color:#111;">Schedule</div>
    <span style="font-size:12px;color:#6b7280;">${totDone}/${allT.length} 完了</span>
  </div>
  <div style="margin-bottom:16px;">${pbar(totPct,PALETTE.thesis,"sch-tot-bar")}<div style="display:flex;justify-content:flex-end;margin-top:2px;"><span id="sch-tot-pct" style="font-size:11px;font-weight:700;color:${PALETTE.thesis};">${totPct}%</span></div></div>`;

  // summary cards
  const dLeft=d=>Math.ceil((new Date(d)-new Date())/86400000);
  const dBadge=(d)=>{const n=dLeft(d);const bg=n<0?"#6E1E3A":n<=7?"#FADD8B":"#A4BDE0";const tc=n<0?"#fff":n<=7?"#7a5800":"#1a3a5c";return `<span class="badge" style="background:${bg};color:${tc};">${n<0?Math.abs(n)+"日超過":n+"日"}</span>`;};
  h+=`<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
    ${[{t:"推敲のみ",d:"3/30〜4/4　10本",dl:"2026-04-04"},{t:"新規執筆",d:"4/5〜4/17　6本",dl:"2026-04-17"},{t:"全完了",d:"4/17　16本",dl:"2026-04-17"},{t:"以降",d:"4/18〜　修論集中",dl:null}].map(c=>`<div style="background:#f3f4f6;border-radius:8px;padding:8px 12px;flex:1;min-width:130px;"><div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:3px;">${c.t}</div><div style="font-size:11px;color:#6b7280;margin-bottom:${c.dl?5:0}px;">${c.d}</div>${c.dl?dBadge(c.dl):""}</div>`).join("")}
  </div>`;

  SCH_PHASES.forEach(phase=>{
    h+=`<div class="sch-phase"><div class="sch-phase-line"></div><span class="sch-phase-label">${esc(phase.label)}</span><div class="sch-phase-line"></div></div>`;
    phase.segs.forEach(s=>{
      const sa=s.weeks.flatMap(w=>w.tasks),sd=sa.filter(t=>schCk[t.id]).length,sp=Math.round(sd/sa.length*100);
      const isO=schOpenS[s.id]===true;
      let whtml="";
      s.weeks.forEach(w=>{
        const isWO=schOpenW[w.id]===true,wdone=w.tasks.filter(t=>schCk[t.id]).length;
        let thtml="";
        w.tasks.forEach(t=>{const ck=!!schCk[t.id];thtml+=`<div id="scht-${t.id}" class="sch-task"><input type="checkbox" style="accent-color:${s.col};" ${ck?"checked":""} onchange="toggleSchTask('${t.id}')"><span class="sch-task-t${ck?" done":""}">${esc(t.t)}</span></div>`;});
        const db=w.dead?`<div class="sch-dead-bar">⚠ ${esc(w.dead)}</div>`:"";
        whtml+=`<div style="border-bottom:1px solid #f0f0f0;"><div class="sch-wk-head" onclick="toggleSchWk('${w.id}')"><span style="font-size:12px;font-weight:700;color:${s.col};min-width:90px;">${esc(w.lbl)}</span><span style="font-size:11px;color:#6b7280;flex:1;">${esc(w.date)}</span><span style="font-size:11px;color:#9ca3af;">${wdone}/${w.tasks.length}</span><span id="schwkarr-${w.id}" style="font-size:11px;color:#9ca3af;margin-left:6px;">${isWO?"▲":"▼"}</span></div><div id="schwkbody-${w.id}" style="display:${isWO?"block":"none"};">${db}<div style="padding:8px 14px 10px 18px;">${thtml}</div></div></div>`;
      });
      h+=`<div class="sch-seg"><div class="sch-seg-head" onclick="toggleSchSeg('${s.id}')"><div style="width:10px;height:10px;border-radius:50%;background:${s.col};flex-shrink:0;"></div><div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:700;color:#1f2937;">${esc(s.title)}</div><div style="font-size:12px;color:#6b7280;">${esc(s.period)}</div>${pbar(sp,s.col,"spbar-"+s.id)}<div id="sstat-${s.id}" style="font-size:11px;color:#9ca3af;margin-top:2px;">${sd}/${sa.length} 完了</div></div><span id="scharr-${s.id}" style="font-size:11px;color:#9ca3af;">${isO?"▲":"▼"}</span></div><div id="schbody-${s.id}" style="border-top:2px solid #f3f4f6;display:${isO?"block":"none"};">${whtml}</div></div>`;
    });
  });
  h+=`<div id="save-status" style="font-size:11px;color:#9ca3af;margin-top:16px;">✓ Saved</div>`;
  return h;
}

// ── RENDER ─────────────────────────────────────────────
function renderMain(){
  let html;
  if(currentView==="dash")html=renderDash();
  else if(currentView==="subject")html=renderSubject();
  else if(currentView==="timeline")html=renderTimeline();
  else if(currentView==="schedule")html=renderSchedule();
  document.getElementById("main").innerHTML=html;
}
function fullRender(){updateSidebar();renderMain();}

// ── INIT ───────────────────────────────────────────────
const raw=load();
projects=raw?migrateData(raw):DEFAULT_PROJECTS;
fullRender();
</script>
