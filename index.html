body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f9fafb;display:flex;min-height:100vh;}

#sidebar{width:210px;background:#fff;border-right:1px solid #e5e7eb;padding:20px 0;flex-shrink:0;height:100vh;position:sticky;top:0;overflow-y:auto;}

.task-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid #e5e7eb;margin-bottom:5px;}
.subtask-item{border:1px solid #e5e7eb;border-radius:8px;margin-bottom:5px;}
.subtask-header{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;user-select:none;}
.subtask-body{padding:0 12px 12px;border-top:1px solid #f3f4f6;}
.child-row{border:1px solid #e5e7eb;border-radius:8px;margin-bottom:4px;}
.child-header{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;user-select:none;}
.child-body{padding:6px 12px 10px 40px;}
.report-card{border:1px solid #e5e7eb;border-radius:10px;margin-bottom:8px;overflow:hidden;background:#fff;}
.report-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none;}
.report-body{padding:8px 14px 12px;border-top:1px solid #f3f4f6;}
.accordion-wrap{margin-top:10px;}
.accordion-btn{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;color:#374151;font-weight:600;width:100%;user-select:none;}
.accordion-btn.open{border-radius:8px 8px 0 0;}
.accordion-inner{border:1px solid #e5e7eb;border-top:none;border-radius:0 0 8px 8px;background:#fff;}
.sec-btn{width:100%;text-align:left;background:none;border:none;padding:10px 16px;font-size:13px;font-weight:700;color:#374151;cursor:pointer;display:flex;justify-content:space-between;user-select:none;}
.url-input{width:100%;border:1px solid #e5e7eb;border-radius:6px;padding:6px 10px;font-size:12px;outline:none;}
.add-input{flex:1;min-width:80px;border:1px solid #e5e7eb;border-radius:8px;padding:7px 10px;font-size:12px;outline:none;}
.memo-area{width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;font-size:13px;resize:vertical;min-height:72px;outline:none;color:#374151;}
.link-btn{display:flex;align-items:center;gap:6px;font-size:12px;text-decoration:none;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:7px 12px;}
.slbl{font-size:10px;font-weight:700;color:#9ca3af;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.timeline-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:4px;}

/* ── 先行研究 multi-resource styles ── */
.res-section{margin-top:10px;}
.res-section-label{font-size:10px;font-weight:700;color:#9ca3af;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.res-entry{display:flex;align-items:center;gap:6px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:7px;padding:5px 8px;margin-bottom:4px;}
.res-entry-icon{font-size:13px;flex-shrink:0;}
.res-entry-name{flex:1;font-size:12px;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.res-entry-link{font-size:12px;color:inherit;text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.res-del-btn{background:none;border:none;color:#d1d5db;cursor:pointer;font-size:15px;padding:0 2px;flex-shrink:0;line-height:1;}
.res-del-btn:hover{color:#ef4444;}
.res-add-row{display:flex;gap:5px;margin-top:5px;align-items:center;}
.res-add-input{flex:1;border:1px solid #e5e7eb;border-radius:6px;padding:5px 9px;font-size:12px;outline:none;color:#374151;background:#fff;}
.res-add-btn{border:none;border-radius:6px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.res-tab-bar{display:flex;gap:4px;margin-bottom:8px;}
.res-tab{border:1px solid #e5e7eb;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:#6b7280;}
.res-tab.active{color:#fff;}
.pdf-label-input{width:120px;border:1px solid #e5e7eb;border-radius:6px;padding:5px 8px;font-size:12px;outline:none;}

// レポートのタブ状態管理
const repTabState={};

// ── UTILS ──────────────────────────────────────────────
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const daysLeft=d=>d?Math.ceil((new Date(d)-new Date())/86400000):null;
const c2n=s=>s.replace(/①/g," 1").replace(/②/g," 2").replace(/③/g," 3").replace(/④/g," 4");
function badge(dl){const d=daysLeft(dl);if(d===null)return "";const col=d<0?"#ef4444":d<=7?"#f59e0b":d<=30?"#3b82f6":"#10b981",bg=d<0?"#fef2f2":d<=7?"#fffbeb":d<=30?"#eff6ff":"#ecfdf5";return `<span class="badge" style="color:${col};background:${bg};">${d<0?Math.abs(d)+"日超過":d===0?"今日！":d+"日"}</span>`;}
function pbar(pct,col,id=""){return `<div class="pbar-wrap"${id?` id="${id}"`:""}><div class="pbar-fill" style="width:${pct}%;background:${col};"></div></div>`;}
function calcPct(p){if(p.tasks){const a=[...p.tasks,...(p.subtasks||[])];return a.length?Math.round(a.filter(t=>t.done).length/a.length*100):0;}if(p.reports){const tot=p.reports.reduce((a,r)=>a+r.steps.length,0),dn=p.reports.reduce((a,r)=>a+r.steps.filter(s=>s.done).length,0);return tot?Math.round(dn/tot*100):0;}return 0;}
const getProj=()=>projects.find(p=>p.id===selected);
const uid=()=>Math.random().toString(36).slice(2,9);

// ── PERSIST ────────────────────────────────────────────
const KEY="tracker_v20";
function load(){try{const s=localStorage.getItem(KEY);return s?JSON.parse(s):null;}catch{return null;}}
function save(){
  clearTimeout(saveTimer);
  const el=document.getElementById("save-status");if(el)el.textContent="Saving…";
  saveTimer=setTimeout(()=>{try{localStorage.setItem(KEY,JSON.stringify(projects));}catch(e){console.error(e);}const el2=document.getElementById("save-status");if(el2)el2.textContent=`✓ Saved (${(JSON.stringify(projects).length/1024).toFixed(1)}kb)`;},700);
}

// ── migrate: ensure reports have urls/pdfs arrays ──────
function migrateData(ps){
  return ps.map(p=>{
    // migrate subtasks (先行研究)
    let np={...p};
    if(np.subtasks){
      np={...np,subtasks:np.subtasks.map(s=>{
        if(!s.isLiterature||!s.children)return s;
        return {...s,children:s.children.map(c=>{
          if(!c.urls){
            const urls=c.url?[{id:uid(),href:c.url,label:""}]:[];
            const {url,...rest}=c;
            return {...rest,urls,pdfs:c.pdfs||[],words:c.words||[]};
          }
          return {...c,words:c.words||[]};
        })};
      })};
    }
    // migrate reports: ensure urls/pdfs/words arrays exist
    if(np.reports){
      np={...np,reports:np.reports.map(r=>({
        ...r,
        urls:r.urls||[],
        pdfs:r.pdfs||[],
        words:r.words||[],
      }))};
    }
    return np;
  });
}

// ── SIDEBAR ────────────────────────────────────────────
function updateSidebar(){
  const bp=document.getElementById("btn-project"),bt=document.getElementById("btn-timeline");
  [bp,bt].forEach(b=>{b.style.background="transparent";b.style.color="#9ca3af";b.style.boxShadow="none";});
  const ab=currentView==="project"?bp:bt;ab.style.background="#fff";ab.style.color="#111";ab.style.boxShadow="0 1px 3px rgba(0,0,0,.1)";
  document.getElementById("sidebar-projects").innerHTML=projects.map(p=>{
    const tot=p.tasks?[...p.tasks,...(p.subtasks||[])].length:p.reports?p.reports.reduce((a,r)=>a+r.steps.length,0):0;
    const dn=p.tasks?[...p.tasks,...(p.subtasks||[])].filter(t=>t.done).length:p.reports?p.reports.reduce((a,r)=>a+r.steps.filter(s=>s.done).length,0):0;
    const act=selected===p.id&&currentView==="project";
    return `<div onclick="selectProject('${p.id}')" style="padding:8px 18px;cursor:pointer;border-left:${act?`3px solid ${p.color}`:"3px solid transparent"};background:${act?"#f3f4f6":"transparent"};"><div style="display:flex;align-items:center;gap:7px;"><span style="width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0;"></span><span style="flex:1;font-size:12px;color:#1f2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.title)}</span><span style="font-size:11px;color:#9ca3af;">${dn}/${tot}</span></div><div style="margin-left:15px;">${pbar(calcPct(p),p.color)}</div></div>`;
  }).join("");
}
function refreshProgress(){
  updateSidebar();
  const proj=getProj(),pct=calcPct(proj);
  const pb=document.getElementById("proj-pbar");if(pb)pb.querySelector(".pbar-fill").style.width=pct+"%";
  const pp=document.getElementById("proj-pct");if(pp)pp.textContent=pct+"%";
}

// ── MUTATIONS (tasks) ──────────────────────────────────
window.toggleTask=tid=>{
  const t=getProj().tasks.find(t=>t.id===tid);if(!t)return;t.done=!t.done;save();
  const row=document.getElementById("task-"+tid);
  if(row){row.style.background=t.done?"#f9fafb":"#fff";row.style.opacity=t.done?"0.55":"1";row.querySelector("input").checked=t.done;const l=row.querySelector(".tlbl");l.style.color=t.done?"#9ca3af":"#1f2937";l.style.textDecoration=t.done?"line-through":"none";}
  refreshProgress();
};
window.deleteTask=tid=>{projects=projects.map(p=>p.id===selected?{...p,tasks:p.tasks.filter(t=>t.id!==tid)}:p);save();document.getElementById("task-"+tid)?.remove();refreshProgress();};
window.addTask=()=>{
  const ti=document.getElementById("new-task-input"),di=document.getElementById("new-deadline-input");
  const txt=ti.value.trim();if(!txt)return;
  const nt={id:Date.now().toString(),text:txt,done:false,deadline:di.value||""};
  projects=projects.map(p=>p.id===selected?{...p,tasks:[...p.tasks,nt]}:p);save();ti.value="";di.value="";
  const c=document.getElementById("task-list");if(c){const d=document.createElement("div");d.innerHTML=taskRowHtml(nt,getProj().color);c.appendChild(d.firstElementChild);}
  refreshProgress();
};

// ── MUTATIONS (subtasks) ───────────────────────────────
function findSt(sid){for(const s of getProj().subtasks||[]){if(s.id===sid)return s;if(s.children){const c=s.children.find(c=>c.id===sid);if(c)return c;}}return null;}
function mutateSt(sid,fn){projects=projects.map(p=>p.id!==selected?p:{...p,subtasks:p.subtasks.map(s=>{if(s.id===sid)return fn(s);if(s.children)return{...s,children:s.children.map(c=>c.id===sid?fn(c):c)};return s;})});}

window.toggleSubtask=sid=>{
  mutateSt(sid,s=>({...s,done:!s.done}));save();
  const s=findSt(sid),col=getProj().color;
  const wrap=document.getElementById("stwrap-"+sid);if(wrap){wrap.style.background=s.done?"#f9fafb":"#fff";wrap.style.opacity=s.done?"0.7":"1";}
  const lbl=document.getElementById("stlbl-"+sid);if(lbl){lbl.style.color=s.done?"#9ca3af":"#1f2937";lbl.style.textDecoration=s.done?"line-through":"none";}
  const bul=document.getElementById("stbul-"+sid);if(bul&&!bul.dataset.dot){bul.style.background=s.done?col:"#e5e7eb";bul.style.color=s.done?"#fff":"#6b7280";}
  document.querySelectorAll(`.markbtn-${sid}`).forEach(b=>b.textContent=s.done?"✓ Done":"Mark as done");
  refreshProgress();
};
window.setSubtaskNote=(sid,note)=>{mutateSt(sid,s=>({...s,note}));save();};
window.setSubtaskUrl=(sid,url)=>{mutateSt(sid,s=>({...s,url}));save();const sec=document.getElementById("sturl-"+sid);if(sec)sec.innerHTML=urlSec(sid,url,getProj().color);};
window.toggleParent=sid=>{const p=getProj(),s=p.subtasks.find(s=>s.id===sid);if(!s)return;s.open=!s.open;save();const cw=document.getElementById("children-"+sid),ar=document.getElementById("par-arrow-"+sid);if(cw)cw.style.display=s.open?"block":"none";if(ar)ar.textContent=s.open?"▲":"▼";};
window.toggleStBody=sid=>{const b=document.getElementById("stbody-"+sid),ar=document.getElementById("starrow-"+sid);if(!b)return;const o=b.style.display==="block";b.style.display=o?"none":"block";if(ar)ar.textContent=o?"▼":"▲";};
window.toggleChildBody=sid=>{const b=document.getElementById("cbody-"+sid),ar=document.getElementById("carrow-"+sid);if(!b)return;const o=b.style.display==="block";b.style.display=o?"none":"block";if(ar)ar.textContent=o?"▼":"▲";};

}

window.toggleReport=rid=>{const p=getProj(),r=p.reports.find(r=>r.id===rid);if(!r)return;r.open=!r.open;save();const b=document.getElementById("rbody-"+rid),ar=document.getElementById("rarrow-"+rid);if(b)b.style.display=r.open?"block":"none";if(ar)ar.textContent=r.open?"▲":"▼";};
window.toggleStep=(rid,sid)=>{

};
window.setReportUrl=(rid,url)=>{const p=getProj(),r=p.reports.find(r=>r.id===rid);if(!r)return;r.url=url;save();const w=document.getElementById("rurl-"+rid);if(w)w.innerHTML=reportUrl(rid,url,p.color);};

window.addRepUrl=(rid)=>{
  const inp=document.getElementById(`repurlinput-${rid}`);
  const labelInp=document.getElementById(`repurllabel-${rid}`);
  const href=inp.value.trim();if(!href)return;
  const label=labelInp.value.trim()||href.replace(/^https?:\/\//,"").slice(0,40);
  const entry={id:uid(),href,label};
  mutateReport(rid,r=>({...r,urls:[...(r.urls||[]),entry]}));save();
  inp.value="";labelInp.value="";
  rerenderRepResources(rid);
};

window.delRepUrl=(rid,eid)=>{
  mutateReport(rid,r=>({...r,urls:(r.urls||[]).filter(u=>u.id!==eid)}));save();

};

window.addRepFile=(rid)=>{
  const inp=document.getElementById(`repfileinput-${rid}`);
  const file=inp.files[0];if(!file)return;
  const isPdf=file.type==="application/pdf"||file.name.endsWith(".pdf");
  const reader=new FileReader();
  reader.onload=e=>{
    const entry={id:uid(),name:file.name,data:e.target.result};
    if(isPdf){mutateReport(rid,r=>({...r,pdfs:[...(r.pdfs||[]),entry]}));}
    else{mutateReport(rid,r=>({...r,words:[...(r.words||[]),entry]}));}
    save();inp.value="";
    rerenderRepResources(rid);
  };
  reader.readAsDataURL(file);
};

window.toggleAccordion=id=>{const btn=document.getElementById("abtn-"+id),body=document.getElementById("abody-"+id);if(!btn||!body)return;const o=body.style.display==="block";body.style.display=o?"none":"block";btn.classList.toggle("open",!o);btn.querySelector(".ac-arrow").textContent=o?"▼":"▲";};
window.toggleAccSec=(aid,idx)=>{const body=document.getElementById("abody-"+aid);if(!body)return;body.querySelectorAll("[data-sec]").forEach((el,i)=>{const ar=document.getElementById(`asarr-${aid}-${i}`);if(i===idx){const o=el.style.display==="block";el.style.display=o?"none":"block";if(ar)ar.textContent=o?"▼":"▲";}else{el.style.display="none";if(ar)ar.textContent="▼";}});};
window.toggleTimelineDone=()=>renderMain();
window.updateBulletColor=(sid,note,col)=>{
  const hasNote=!!(note&&note.trim());
  const bul=document.getElementById("stbul-"+sid);
  if(!bul)return;
  if(bul.dataset.dot){bul.style.color=hasNote?col:"#d1d5db";}
  else{const isCircle=bul.style.borderRadius==="50%"||bul.style.width==="20px"&&bul.style.height==="20px";if(isCircle){bul.style.background=hasNote?col:"#e5e7eb";bul.style.color=hasNote?"#fff":"#6b7280";}else{bul.style.color=hasNote?col:"#d1d5db";}}
};

// ── HTML BUILDERS ──────────────────────────────────────
function urlSec(sid,url,col){if(url)return `<div style="display:flex;align-items:center;gap:6px;"><a href="${esc(url)}" target="_blank" style="flex:1;font-size:12px;color:${col};text-decoration:none;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:4px 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;">🔗 ${esc(url.replace("https://","").slice(0,50))}…</a><button onclick="setSubtaskUrl('${sid}','')" style="background:none;border:none;color:#d1d5db;cursor:pointer;font-size:14px;">×</button></div>`;return `<input class="url-input" placeholder="URL or Google Drive link…" onblur="if(this.value){setSubtaskUrl('${sid}',this.value);this.value='';}">"`+`>`;}
function reportUrl(rid,url,col){if(url)return `<div style="display:flex;align-items:center;gap:6px;"><a href="${esc(url)}" target="_blank" style="flex:1;font-size:12px;color:${col};text-decoration:none;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:5px 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;">📄 ${esc(url.replace("https://","").slice(0,45))}…</a><button onclick="clearReportUrl('${rid}')" style="background:none;border:none;color:#d1d5db;cursor:pointer;font-size:14px;">×</button></div>`;return `<input class="url-input" placeholder="Google Drive URL…" onblur="if(this.value){setReportUrl('${rid}',this.value);this.value='';}">"`+`>`;}
function accordionHtml(id,icon,title,sections,weight){weight=weight||"600";
  const inner=sections.map((s,i)=>{const content=s.items?`<ul data-sec style="margin:0 0 10px;padding:0 16px 0 32px;display:none;">${s.items.map(it=>`<li style="font-size:12px;color:#4b5563;line-height:1.9;">${esc(it)}</li>`).join("")}</ul>`:`<div data-sec style="font-size:12px;color:#4b5563;line-height:1.9;padding:0 16px 12px;white-space:pre-wrap;display:none;">${esc(s.content)}</div>`;return `<div style="border-bottom:${i<sections.length-1?"1px solid #f3f4f6":"none"};"><button class="sec-btn" onclick="toggleAccSec('${id}',${i})">${esc(s.title)}<span id="asarr-${id}-${i}" style="color:#9ca3af;font-weight:400;font-size:11px;">▼</span></button>${content}</div>`;}).join("");
  return `<div class="accordion-wrap"><button id="abtn-${id}" class="accordion-btn" onclick="toggleAccordion('${id}')" style="font-weight:${weight};"><span>${icon} ${esc(title)}</span><span class="ac-arrow" style="margin-left:auto;color:#9ca3af;font-size:11px;">▼</span></button><div id="abody-${id}" class="accordion-inner" style="display:none;">${inner}</div></div>`;
}
function stBodyHtml(s,col,hasUrl){
  const oninput=`setSubtaskNote('${s.id}',this.value);updateBulletColor('${s.id}',this.value,'${col}')`;
  const hasRes=Array.isArray(s.urls);
  const resHtml=hasRes?`<div id="stres-${s.id}" style="margin-top:8px;">${stResourcesHtml(s,col)}</div>`:"";
  return `<div id="stbody-${s.id}" class="subtask-body" style="display:none;"><textarea style="width:100%;border:1px solid #e5e7eb;border-radius:6px;padding:8px 10px;font-size:12px;resize:vertical;min-height:80px;outline:none;box-sizing:border-box;color:#374151;margin-top:8px;" placeholder="Notes…" oninput="${oninput}">${esc(s.note||"")}</textarea>${resHtml}<div style="margin-top:10px;display:flex;justify-content:flex-end;"><button class="markbtn-${s.id}" onclick="toggleSubtask('${s.id}')" style="font-size:12px;color:${col};background:none;border:1px solid ${col};border-radius:6px;padding:4px 12px;cursor:pointer;">${s.done?"✓ Done":"Mark as done"}</button></div></div>`;
}
function stItemHtml(s,idx,col,isResearch){
  const hasNote=!!(s.note&&s.note.trim());
  const dotCol=s.done?"#9ca3af":hasNote?col:"#d1d5db";
  const bul=isResearch

const stTabState={};
window.setStTab=(sid,tab)=>{
  stTabState[sid]=tab;
  const col=getProj().color;
  ["url","file"].forEach(t=>{
    const sec=document.getElementById(`st${t}-sec-${sid}`);
    const btn=document.getElementById(`sttab-${t}-${sid}`);
    if(sec)sec.style.display=tab===t?"block":"none";
    if(btn){btn.style.background=tab===t?col:"#fff";btn.style.color=tab===t?"#fff":"#6b7280";btn.style.borderColor=tab===t?col:"#e5e7eb";}
  });
};
window.addStUrl=(sid)=>{
  const inp=document.getElementById(`sturlinput-${sid}`);
  const labelInp=document.getElementById(`sturllabel-${sid}`);
  const href=inp.value.trim();if(!href)return;
  const label=labelInp.value.trim()||href.replace(/^https?:\/\//,"").slice(0,40);
  mutateSt(sid,s=>({...s,urls:[...(s.urls||[]),{id:uid(),href,label}]}));save();
  inp.value="";labelInp.value="";rerenderStResources(sid);
};
window.delStUrl=(sid,eid)=>{mutateSt(sid,s=>({...s,urls:(s.urls||[]).filter(u=>u.id!==eid)}));save();rerenderStResources(sid);};
window.addStFile=(sid)=>{
  const inp=document.getElementById(`stfileinput-${sid}`);
  const file=inp.files[0];if(!file)return;
  const isPdf=file.type==="application/pdf"||file.name.endsWith(".pdf");
  const reader=new FileReader();
  reader.onload=e=>{
    const entry={id:uid(),name:file.name,data:e.target.result};
    if(isPdf){mutateSt(sid,s=>({...s,pdfs:[...(s.pdfs||[]),entry]}));}
    else{mutateSt(sid,s=>({...s,words:[...(s.words||[]),entry]}));}
    save();inp.value="";rerenderStResources(sid);
  };
  reader.readAsDataURL(file);
};
window.delStPdf=(sid,eid)=>{mutateSt(sid,s=>({...s,pdfs:(s.pdfs||[]).filter(p=>p.id!==eid)}));save();rerenderStResources(sid);};
window.delStWord=(sid,eid)=>{mutateSt(sid,s=>({...s,words:(s.words||[]).filter(w=>w.id!==eid)}));save();rerenderStResources(sid);};
window.openStPdf=(sid,eid)=>{const s=findSt(sid);if(!s)return;const p=(s.pdfs||[]).find(p=>p.id===eid);if(!p)return;const w=window.open();w.document.write(`<iframe src="${p.data}" width="100%" height="100%" style="border:none;position:fixed;top:0;left:0;width:100%;height:100%;"></iframe>`);};
window.downloadStWord=(sid,eid)=>{const s=findSt(sid);if(!s)return;const w=(s.words||[]).find(w=>w.id===eid);if(!w)return;const a=document.createElement("a");a.href=w.data;a.download=w.name;a.click();};

function parentHtml(s,idx,col,isLit){
  const childDone=s.children.filter(c=>c.done).length;
  const children=isLit
    ? s.children.map((c,ci)=>litChildHtml(c,ci,col)).join("")
    : s.children.map((c,ci)=>{
        const hasNote=!!(c.note&&c.note.trim());
        const numCol=c.done?"#9ca3af":hasNote?col:"#d1d5db";
        const oninput=`setSubtaskNote('${c.id}',this.value);updateBulletColor('${c.id}',this.value,'${col}')`;
        const hasRes=Array.isArray(c.urls);
        const totalRes=hasRes?(c.urls||[]).length+(c.pdfs||[]).length+(c.words||[]).length:0;
        const resBadge=totalRes>0?`<span style="font-size:10px;font-weight:700;background:${col};color:#fff;border-radius:99px;padding:1px 5px;margin-left:4px;">${totalRes}</span>`:"";

  const combinedResBadge=isLit?resBadge:"";
  const parResHtml="";

function renderTimeline(){

  const all=projects.flatMap(p=>{
    if(p.tasks)return p.tasks.filter(t=>t.deadline).map(t=>({key:t.id,label:t.text,deadline:t.deadline,done:t.done,color:p.color,proj:p.title}));
    if(p.reports)return p.reports.flatMap(r=>[{key:r.id+"_d",label:c2n(r.label.replace(/〈前期〉|〈後期〉/g,"").trim().replace("レポート","Report"))+" — Draft",deadline:r.deadline,done:r.steps[0]?.done,color:p.color,proj:p.title},{key:r.id+"_f",label:c2n(r.label.replace(/〈前期〉|〈後期〉/g,"").trim().replace("レポート","Report"))+" — Final",deadline:r.finalDeadline,done:r.steps[3]?.done,color:p.color,proj:p.title}]);
    return[];
  }).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const filtered=hideDone?all.filter(t=>!t.done):all;
  const groups={};filtered.forEach(t=>{const k=t.deadline?.slice(0,7)||"未定";if(!groups[k])groups[k]=[];groups[k].push(t);});
  const now=new Date(),cm=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const sem=k=>{const m=parseInt(k.split("-")[1]);if(m>=6&&m<=9)return "〈前期〉";if(m>=10||m<=1)return "〈後期〉";return "";};
  const ml=k=>{if(k==="未定")return "TBD";const[y,m]=k.split("-");return `${sem(k)} ${y}年${parseInt(m)}月`;};
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;"><div style="font-size:18px;font-weight:700;color:#111;">📅 Tasks &amp; Deadlines</div><label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280;cursor:pointer;user-select:none;"><input type="checkbox" id="hide-done-chk" ${hideDone?"checked":""} onchange="toggleTimelineDone()" style="accent-color:#4f46e5;">完了済みを隠す</label></div>`;
  if(!filtered.length)return h+`<div style="text-align:center;padding:60px 0;color:#9ca3af;font-size:14px;">🎉 All done!</div>`;
  Object.keys(groups).forEach(mo=>{
    const isCur=mo===cm;
    h+=`<div style="margin-bottom:22px;"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;"><span style="font-size:13px;font-weight:700;color:${isCur?"#4f46e5":"#374151"};">${isCur?"▶ ":""}${ml(mo)}</span><div style="flex:1;height:1px;background:#e5e7eb;"></div><span style="font-size:11px;color:#9ca3af;">${groups[mo].length}件</span></div>`;
    groups[mo].forEach(t=>{const lbl=t.proj.length>8?t.proj.slice(0,8)+"…":t.proj;h+=`<div class="timeline-row" style="border-left:3px solid ${t.color};opacity:${t.done?0.4:1};"><span style="font-size:12px;color:#9ca3af;width:28px;flex-shrink:0;">${t.deadline?.slice(8)}日</span><span style="flex:1;font-size:13px;color:#1f2937;text-decoration:${t.done?"line-through":"none"};">${esc(t.label)}<span style="font-size:10px;font-weight:700;color:${t.color};margin-left:6px;">${esc(lbl)}</span></span>${badge(t.deadline)}</div>`;});
    h+=`</div>`;
  });
  return h;
}

function renderProjectView(){
  const proj=getProj(),isThesis=proj.id==="thesis",pct=calcPct(proj),col=proj.color;
  let h=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;"><span style="width:12px;height:12px;border-radius:50%;background:${col};flex-shrink:0;"></span><div style="font-size:20px;font-weight:700;color:#111;">${esc(proj.title)}</div></div>${pbar(pct,col,"proj-pbar")}<div style="display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:20px;"><span>Progress</span><span id="proj-pct" style="font-weight:700;color:${col};">${pct}%</span></div>`;

  if(isThesis){
    let left="";
    ["研究内容","Research"].forEach(group=>{
      const items=proj.subtasks.filter(s=>s.group===group);
      const allSub=items.flatMap(s=>s.children?[s,...s.children]:[s]);
      const dn=allSub.filter(s=>s.done).length;
      const label=group==="研究内容"?"Outline":"Research";
      left+=`<div style="margin-bottom:20px;"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><div class="slbl" style="margin-bottom:0;">${label}</div><div style="flex:1;height:1px;background:#e5e7eb;"></div><span style="font-size:11px;color:#9ca3af;">${dn}/${items.length}</span></div>`;
      items.forEach((s,idx)=>{
        if(s.isParent)left+=parentHtml(s,idx,col,!!s.isLiterature);
        else left+=stItemHtml(s,idx,col,group==="Research");
      });
      left+=`</div>`;
    });
    left+=`<div style="margin-top:4px;"><div class="slbl">Memo</div><textarea class="memo-area" placeholder="Notes, references, feedback…" oninput="updateMemo('${proj.id}',this.value)">${esc(proj.memo||"")}</textarea></div>`;

    let right=`<div class="slbl">Links &amp; Reference</div><div style="display:flex;flex-direction:column;gap:6px;margin-bottom:4px;"><a href="https://www.myendnoteweb.com/EndNoteWeb.html" target="_blank" class="link-btn" style="color:${col};">EndNote Web</a><a href="https://docs.google.com/spreadsheets/d/1cIJRqCX5O-vT-tAwC5mpi9WARtgT6D0umUuBo27tXkg/edit?resourcekey=&gid=329566813#gid=329566813" target="_blank" class="link-btn" style="color:${col};">アンケート結果</a></div>${accordionHtml("guide","","覚書：レポート・修論の書き方",GUIDE_SECTIONS,"400")}<div style="margin-top:20px;"><div class="slbl">Tasks</div><div id="task-list">${proj.tasks.map(t=>taskRowHtml(t,col)).join("")}</div><div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;"><input id="new-task-input" class="add-input" placeholder="New task…" onkeydown="if(event.key==='Enter')addTask();"><input id="new-deadline-input" type="date" style="border:1px solid #e5e7eb;border-radius:8px;padding:7px 8px;font-size:12px;outline:none;color:#374151;"><button onclick="addTask()" style="background:${col};color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-weight:600;">Add</button></div></div>`;

    h+=`<div class="two-col"><div class="col-left">${left}</div><div class="col-right">${right}</div></div>`;

  } else {
    if(SYLLABUS[proj.id])h+=accordionHtml("syl-"+proj.id,"🤍","Syllabus",SYLLABUS[proj.id].sections);
    h+=`<div class="slbl" style="margin-top:20px;">Reports</div>`;
    ["前期","後期"].forEach(sem=>{
      const semR=proj.reports.filter(r=>r.label.includes(`〈${sem}〉`));if(!semR.length)return;
      h+=`<div><div style="display:flex;align-items:center;gap:8px;margin:10px 0 6px;"><span style="font-size:12px;font-weight:700;color:${col};">〈${sem}〉</span><div style="flex:1;height:1px;background:#e5e7eb;"></div></div>`;
      semR.forEach(r=>{
        const dn=r.steps.filter(s=>s.done).length,rPct=Math.round(dn/r.steps.length*100);
        const sl=c2n(r.label.replace(/〈前期〉|〈後期〉/g,"").trim().replace("レポート","Report"));
        // resource badge for report card header
        const totalRes=(r.urls||[]).length+(r.pdfs||[]).length;
        const resBadge=totalRes>0?`<span style="font-size:10px;font-weight:700;background:${col};color:#fff;border-radius:99px;padding:1px 5px;margin-left:4px;">📎${totalRes}</span>`:"";
        h+=`<div class="report-card"><div class="report-header" onclick="toggleReport('${r.id}')"><div style="flex:1;"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><span style="font-size:13px;font-weight:600;color:#1f2937;">${esc(sl)}</span>${resBadge}<span style="font-size:11px;color:#6b7280;">Due ${r.deadline?.slice(5).replace("-","/")}</span>${badge(r.deadline)}</div>${pbar(rPct,col,"rbar-"+r.id)}<span id="rprog-${r.id}" style="font-size:11px;color:#9ca3af;">Progress: ${dn}/${r.steps.length} steps completed　／　Final: ${r.finalDeadline?.slice(5).replace("-","/")}</span></div><span id="rarrow-${r.id}" style="font-size:12px;color:#9ca3af;">${r.open?"▲":"▼"}</span></div><div id="rbody-${r.id}" class="report-body" style="display:${r.open?"block":"none"};">`;
        r.steps.forEach((s,i)=>{h+=`<div id="step-${s.id}" style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:${i<r.steps.length-1?"1px solid #f9fafb":"none"};"><input type="checkbox" ${s.done?"checked":""} onchange="toggleStep('${r.id}','${s.id}')" style="width:15px;height:15px;accent-color:${col};flex-shrink:0;"><span class="slbl2" style="flex:1;font-size:13px;color:${s.done?"#9ca3af":"#374151"};text-decoration:${s.done?"line-through":"none"};"><span style="font-size:11px;color:#d1d5db;margin-right:6px;">${i+1}.</span>${esc(s.text)}</span>${i===3?badge(r.finalDeadline):""}</div>`;});
        // Resources (URL + PDF multi-attach)
        h+=`<div id="repres-${r.id}">${repResourcesHtml(r,col)}</div>`;
        h+=`</div></div>`;
      });
      h+=`</div>`;
    });
    h+=`<div style="margin-top:24px;"><div class="slbl">Memo</div><textarea class="memo-area" placeholder="Notes, references, feedback…" oninput="updateMemo('${proj.id}',this.value)">${esc(proj.memo||"")}</textarea></div>`;
  }
  h+=`<div id="save-status" style="font-size:11px;color:#9ca3af;margin-top:16px;">✓ Saved</div>`;
  return h;
}

function renderMain(){
  let html=currentView==="timeline"?renderTimeline():renderProjectView();
  document.getElementById("main").innerHTML=html;
}
function fullRender(){updateSidebar();renderMain();}

// ── INIT ───────────────────────────────────────────────
const raw=load();
projects=raw?migrateData(raw):DEFAULT_PROJECTS;
fullRender();
</script>
