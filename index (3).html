.accordion-btn.open{border-radius:8px 8px 0 0;}

.sec-content{font-size:12px;color:#4b5563;line-height:1.9;padding:0 16px 12px;white-space:pre-wrap;display:none;}
.sec-list{margin:0 0 10px;padding:0 16px 0 32px;}
.sec-list li{font-size:12px;color:#4b5563;line-height:1.9;}
.timeline-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:4px;}
.memo-area{width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;font-size:13px;resize:vertical;min-height:72px;outline:none;color:#374151;}
.url-input{width:100%;border:1px solid #e5e7eb;border-radius:6px;padding:6px 10px;font-size:12px;outline:none;}
.add-input{flex:1;min-width:120px;border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:13px;outline:none;}
.link-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;text-decoration:none;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:7px 14px;}
.child-note{display:none;}
</style>

function loadData() {

function daysLeft(d) { if(!d) return null; return Math.ceil((new Date(d) - new Date()) / 86400000); }
function circleToNum(s) { return s.replace(/①/g," 1").replace(/②/g," 2").replace(/③/g," 3").replace(/④/g," 4"); }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function badgeHtml(deadline) {
  const d = daysLeft(deadline);
  if (d === null) return "";
  const col = d<0?"#ef4444":d<=7?"#f59e0b":d<=30?"#3b82f6":"#10b981";
  const bg  = d<0?"#fef2f2":d<=7?"#fffbeb":d<=30?"#eff6ff":"#ecfdf5";
  const lbl = d<0?`${Math.abs(d)}日超過`:d===0?"今日！":`${d}日`;
  return `<span class="badge" style="color:${col};background:${bg};">${lbl}</span>`;
}

function pbarHtml(pct, color) {
  return `<div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%;background:${color};"></div></div>`;
}

function calcPct(p) {
  if (p.tasks) {
    const all = [...p.tasks, ...(p.subtasks||[])];
    return all.length ? Math.round(all.filter(t=>t.done).length / all.length * 100) : 0;
  }
  if (p.reports) {
    const tot = p.reports.reduce((a,r)=>a+r.steps.length, 0);
    const dn  = p.reports.reduce((a,r)=>a+r.steps.filter(s=>s.done).length, 0);
    return tot ? Math.round(dn/tot*100) : 0;
  }
  return 0;
}

function getProj() { return projects.find(p=>p.id===selected); }
function updateProj(fn) { projects = projects.map(p=>p.id===selected?fn(p):p); saveData(); render(); }

// ── Mutations ──────────────────────────────────────────
window.toggleTask = tid => updateProj(p=>({...p, tasks:p.tasks.map(t=>t.id===tid?{...t,done:!t.done}:t)}));
window.deleteTask = tid => updateProj(p=>({...p, tasks:p.tasks.filter(t=>t.id!==tid)}));
window.addTask = () => {
  const txt = document.getElementById('new-task-input')?.value?.trim();
  const dl  = document.getElementById('new-deadline-input')?.value || "";
  if (!txt) return;
  updateProj(p=>({...p, tasks:[...p.tasks, {id:Date.now().toString(),text:txt,done:false,deadline:dl}]}));
  document.getElementById('new-task-input').value="";
  document.getElementById('new-deadline-input').value="";
};
window.toggleSubtask = sid => updateProj(p=>({...p, subtasks:p.subtasks.map(s=>
  s.id===sid ? {...s,done:!s.done} :
  s.children ? {...s,children:s.children.map(c=>c.id===sid?{...c,done:!c.done}:c)} : s
)}));
window.setSubtaskUrl = (sid,url) => updateProj(p=>({...p, subtasks:p.subtasks.map(s=>s.id===sid?{...s,url}:s)}));
window.setSubtaskNote = (sid,note) => updateProj(p=>({...p, subtasks:p.subtasks.map(s=>
  s.id===sid ? {...s,note} :
  s.children ? {...s,children:s.children.map(c=>c.id===sid?{...c,note}:c)} : s
)}));
window.toggleParent = sid => updateProj(p=>({...p, subtasks:p.subtasks.map(s=>s.id===sid?{...s,open:!s.open}:s)}));
window.toggleReport = rid => updateProj(p=>({...p, reports:p.reports.map(r=>r.id===rid?{...r,open:!r.open}:r)}));
window.toggleStep = (rid,sid) => updateProj(p=>({...p, reports:p.reports.map(r=>r.id===rid?{...r,steps:r.steps.map(s=>s.id===sid?{...s,done:!s.done}:s)}:r)}));
window.setReportUrl = (rid,url) => updateProj(p=>({...p, reports:p.reports.map(r=>r.id===rid?{...r,url}:r)}));
window.clearReportUrl = rid => window.setReportUrl(rid,"");
window.updateMemo = (pid,val) => { projects = projects.map(p=>p.id===pid?{...p,memo:val}:p); saveData(); };

window.setView = v => { currentView=v; render(); };
window.selectProject = id => { selected=id; currentView="project"; render(); };

// ── UI toggles (no state change) ───────────────────────
window.toggleSubtaskBody = id => {
  const el=document.getElementById('stbody-'+id);
  if(el) el.style.display=el.style.display==="block"?"none":"block";
};
window.toggleChildNote = id => {
  const el=document.getElementById('cnote-'+id);
  if(el) el.style.display=el.style.display==="block"?"none":"block";
};
window.toggleAccordion = id => {
  const btn=document.getElementById('abtn-'+id);
  const body=document.getElementById('abody-'+id);
  if(!btn||!body) return;
  const open=body.style.display==="block";
  body.style.display=open?"none":"block";
  btn.classList.toggle("open",!open);
  btn.querySelector('.ac-arrow').textContent=open?"▼":"▲";
};
window.toggleAccordionSec = (aid,idx) => {
  const el=document.getElementById(`asec-${aid}-${idx}`);
  const arr=document.getElementById(`asec-arr-${aid}-${idx}`);
  const secBtn=document.getElementById(`asec-btn-${aid}-${idx}`);
  if(!el) return;
  const open=el.style.display==="block";
  // close all in same accordion
  const wrap=document.getElementById('abody-'+aid);
  if(wrap) {
    wrap.querySelectorAll('[id^="asec-"]').forEach(e=>{ if(e.tagName!=="BUTTON"&&!e.id.includes('-arr-')&&!e.id.includes('-btn-')) e.style.display="none"; });
    wrap.querySelectorAll('[id^="asec-arr-"]').forEach(e=>e.textContent="▼");
    wrap.querySelectorAll('[id^="asec-btn-"]').forEach(e=>e.style.color="#374151");
  }
  if(!open){ el.style.display="block"; if(arr) arr.textContent="▲"; }
};
window.toggleTimelineDone = () => {
  const chk=document.getElementById('hide-done-chk');
  renderMain();
};
window.toggleReportBody = rid => {
  const r = getProj().reports?.find(r=>r.id===rid);
  if(r) window.toggleReport(rid); // uses state update
};

// ── Render helpers ─────────────────────────────────────
function accordionHtml(id, icon, title, color, sections) {
  let inner = sections.map((s,i)=>{
    const content = s.items
      ? `<ul class="sec-list">${s.items.map(it=>`<li>${esc(it)}</li>`).join("")}</ul>`
      : `<div class="sec-content" id="asec-${id}-${i}" style="display:none;">${esc(s.content)}</div>`;
    const realContent = s.items
      ? `<ul class="sec-list" id="asec-${id}-${i}" style="display:none;">${s.items.map(it=>`<li>${esc(it)}</li>`).join("")}</ul>`
      : `<div class="sec-content" id="asec-${id}-${i}" style="display:none;">${esc(s.content)}</div>`;
    return `<div style="border-bottom:${i<sections.length-1?"1px solid #f3f4f6":"none"};">
      <button id="asec-btn-${id}-${i}" class="sec-btn" onclick="toggleAccordionSec('${id}',${i})">
        ${esc(s.title)}<span id="asec-arr-${id}-${i}" style="color:#9ca3af;font-weight:400;font-size:11px;">▼</span>
      </button>
      ${realContent}
    </div>`;
  }).join("");
  return `<div class="accordion-wrap">
    <button id="abtn-${id}" class="accordion-btn" onclick="toggleAccordion('${id}')">
      <span>${esc(icon)} ${esc(title)}</span>
      <span class="ac-arrow" style="margin-left:auto;color:#9ca3af;font-size:11px;">▼</span>
    </button>
    <div id="abody-${id}" class="accordion-inner">${inner}</div>
  </div>`;
}

function subtaskItemHtml(s, idx, color, isChild, isResearch) {
  const bullet = isResearch
    ? `<span style="width:20px;font-size:14px;text-align:center;flex-shrink:0;color:#9ca3af;">●</span>`
    : `<span style="width:20px;height:20px;border-radius:50%;background:${s.done?color:"#e5e7eb"};color:${s.done?"#fff":"#6b7280"};font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${isChild?"·":idx+1}</span>`;
  const urlSection = "url" in s ? `<div style="margin-top:8px;">${
    s.url
      ? `<div style="display:flex;align-items:center;gap:6px;"><a href="${esc(s.url)}" target="_blank" style="flex:1;font-size:12px;color:${color};text-decoration:none;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:4px 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;">🔗 ${esc(s.url.replace("https://","").slice(0,50))}…</a><button onclick="setSubtaskUrl('${s.id}','')" style="background:none;border:none;color:#d1d5db;cursor:pointer;font-size:14px;">×</button></div>`
      : `<input class="url-input" placeholder="URL or Google Drive link…" onblur="if(this.value){setSubtaskUrl('${s.id}',this.value);this.value='';}">`
  }</div>` : "";
  return `<div class="subtask-item" style="background:${s.done?"#f9fafb":"#fff"};opacity:${s.done?0.7:1};">
    <div class="subtask-header" onclick="toggleSubtaskBody('${s.id}')">
      ${bullet}
      <span style="flex:1;font-size:${isChild?12:13}px;color:${s.done?"#9ca3af":"#1f2937"};text-decoration:${s.done?"line-through":"none"};">${esc(s.text)}</span>
      <span style="font-size:11px;color:#9ca3af;">▼</span>
    </div>
    <div id="stbody-${s.id}" class="subtask-body">
      <textarea style="width:100%;border:1px solid #e5e7eb;border-radius:6px;padding:8px 10px;font-size:12px;resize:vertical;min-height:80px;outline:none;box-sizing:border-box;color:#374151;margin-top:8px;" placeholder="Notes…" oninput="setSubtaskNote('${s.id}',this.value)">${esc(s.note||"")}</textarea>
      ${urlSection}
      <div style="margin-top:10px;display:flex;justify-content:flex-end;">
        <button onclick="toggleSubtask('${s.id}')" style="font-size:12px;color:${color};background:none;border:1px solid ${color};border-radius:6px;padding:4px 12px;cursor:pointer;">${s.done?"✓ Done":"Mark as done"}</button>
      </div>
    </div>
  </div>`;
}

function renderTimeline() {
  const hideDone = document.getElementById('hide-done-chk')?.checked ?? true;
  const allItems = projects.flatMap(p => {
    if (p.tasks) return p.tasks.filter(t=>t.deadline).map(t=>({key:t.id,label:t.text,deadline:t.deadline,done:t.done,color:p.color,proj:p.title}));
    if (p.reports) return p.reports.flatMap(r=>[
      {key:r.id+"_d",label:circleToNum(r.label.replace(/〈前期〉|〈後期〉/g,"").trim().replace("レポート","Report"))+" — Draft",deadline:r.deadline,done:r.steps[0]?.done,color:p.color,proj:p.title},
      {key:r.id+"_f",label:circleToNum(r.label.replace(/〈前期〉|〈後期〉/g,"").trim().replace("レポート","Report"))+" — Final",deadline:r.finalDeadline,done:r.steps[3]?.done,color:p.color,proj:p.title},
    ]);
    return [];
  }).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));

  const filtered = hideDone ? allItems.filter(t=>!t.done) : allItems;
  const groups = {};
  filtered.forEach(t=>{ const k=t.deadline?.slice(0,7)||"未定"; if(!groups[k]) groups[k]=[]; groups[k].push(t); });
  const now = new Date();
  const currentMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const semOf = k => { const m=parseInt(k.split("-")[1]); if(m>=6&&m<=9)return "〈前期〉"; if(m>=10||m<=1)return "〈後期〉"; return ""; };
  const mLabel = k => { if(k==="未定")return "TBD"; const[y,m]=k.split("-"); return `${semOf(k)} ${y}年${parseInt(m)}月`; };

  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <div style="font-size:18px;font-weight:700;color:#111;">📅 Tasks &amp; Deadlines</div>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280;cursor:pointer;user-select:none;">
      <input type="checkbox" id="hide-done-chk" ${hideDone?"checked":""} onchange="renderMain()" style="accent-color:#4f46e5;">完了済みを隠す
    </label>
  </div>`;

  if (!filtered.length) {
    html += `<div style="text-align:center;padding:60px 0;color:#9ca3af;font-size:14px;">🎉 All done!</div>`;
  } else {
    Object.keys(groups).forEach(month => {
      const isCurrent = month===currentMonth;
      html += `<div style="margin-bottom:22px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <span style="font-size:13px;font-weight:700;color:${isCurrent?"#4f46e5":"#374151"};">${isCurrent?"▶ ":""}${mLabel(month)}</span>
          <div style="flex:1;height:1px;background:#e5e7eb;"></div>
          <span style="font-size:11px;color:#9ca3af;">${groups[month].length}件</span>
        </div>`;
      groups[month].forEach(t => {
        const proj = t.proj.length>8?t.proj.slice(0,8)+"…":t.proj;
        html += `<div class="timeline-row" style="border-left:3px solid ${t.color};opacity:${t.done?0.4:1};">
          <span style="font-size:12px;color:#9ca3af;width:28px;flex-shrink:0;">${t.deadline?.slice(8)}日</span>
          <span style="flex:1;font-size:13px;color:#1f2937;line-height:1.4;text-decoration:${t.done?"line-through":"none"};">
            ${esc(t.label)}<span style="font-size:10px;font-weight:700;color:${t.color};margin-left:6px;opacity:.85;">${esc(proj)}</span>
          </span>
          ${badgeHtml(t.deadline)}
        </div>`;
      });
      html += `</div>`;
    });
  }
  return html;
}

function renderProjectView() {
  const proj = getProj();
  const isThesis = proj.id==="thesis";
  const pct = calcPct(proj);
  let html = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
    <span style="width:12px;height:12px;border-radius:50%;background:${proj.color};flex-shrink:0;"></span>
    <div style="font-size:20px;font-weight:700;color:#111;">${esc(proj.title)}</div>
  </div>
  ${pbarHtml(pct,proj.color)}
  <div style="display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:20px;">
    <span>Progress</span><span style="font-weight:700;color:${proj.color};">${pct}%</span>
  </div>`;

  // Links (thesis only)
  if (isThesis) {
    html += `<div style="margin-bottom:24px;">
      <div style="font-size:10px;font-weight:700;color:#9ca3af;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Links</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <a href="https://www.myendnoteweb.com/EndNoteWeb.html" target="_blank" class="link-btn" style="color:${proj.color};">🔗 EndNote Web</a>
        <a href="https://docs.google.com/spreadsheets/d/1cIJRqCX5O-vT-tAwC5mpi9WARtgT6D0umUuBo27tXkg/edit?resourcekey=&gid=329566813#gid=329566813" target="_blank" class="link-btn" style="color:${proj.color};">📊 アンケート結果</a>
      </div>
    </div>`;
  }

  // Tasks (thesis)
  if (isThesis) {
    html += `<div><div style="font-size:10px;font-weight:700;color:#9ca3af;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Tasks</div>`;
    proj.tasks.forEach(t => {
      html += `<div class="task-row${t.done?" done":""}">
        <input type="checkbox" ${t.done?"checked":""} onchange="toggleTask('${t.id}')" style="width:15px;height:15px;accent-color:${proj.color};flex-shrink:0;">
        <span style="flex:1;font-size:13px;color:${t.done?"#9ca3af":"#1f2937"};text-decoration:${t.done?"line-through":"none"};">${esc(t.text)}</span>
        ${t.deadline?`<span style="font-size:11px;color:#6b7280;white-space:nowrap;">Due ${t.deadline.slice(5).replace("-","/")} </span>`:""} 
        ${t.deadline?badgeHtml(t.deadline):""}
        <button onclick="deleteTask('${t.id}')" style="background:none;border:none;color:#d1d5db;cursor:pointer;font-size:15px;padding:0 2px;">×</button>
      </div>`;
    });
    html += `<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
      <input id="new-task-input" class="add-input" placeholder="Add a new task…" onkeydown="if(event.key==='Enter')addTask();">
      <input id="new-deadline-input" type="date" style="border:1px solid #e5e7eb;border-radius:8px;padding:8px 10px;font-size:13px;outline:none;color:#374151;">
      <button onclick="addTask()" style="background:${proj.color};color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;font-weight:600;">Add</button>
    </div></div>`;
  }

  // Subtasks (thesis)
  if (isThesis && proj.subtasks) {
    html += `<div style="margin-top:24px;">`;
    ["研究内容","Research"].forEach(group => {
      const items = proj.subtasks.filter(s=>s.group===group);
      const allSub = items.flatMap(s=>s.children?[s,...s.children]:[s]);
      const dn = allSub.filter(s=>s.done).length;
      const label = group==="研究内容"?"Outline":"Research";
      html += `<div style="margin-bottom:20px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <div style="font-size:10px;font-weight:700;color:#9ca3af;letter-spacing:1px;text-transform:uppercase;">${label}</div>
          <div style="flex:1;height:1px;background:#e5e7eb;"></div>
          <span style="font-size:11px;color:#9ca3af;">${dn}/${items.length}</span>
        </div>`;
      items.forEach((s,idx) => {
        if (s.isParent) {
          const childDone = s.children.filter(c=>c.done).length;
          html += `<div style="margin-bottom:5px;">
            <div style="border:1px solid #e5e7eb;border-radius:8px;background:#fff;">
              <div onclick="toggleParent('${s.id}')" style="display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;">
                <span style="width:20px;height:20px;border-radius:50%;background:${s.done?proj.color:"#e5e7eb"};color:${s.done?"#fff":"#6b7280"};font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${idx+1}</span>
                <span style="flex:1;font-size:13px;color:${s.done?"#9ca3af":"#1f2937"};text-decoration:${s.done?"line-through":"none"};">${esc(s.text)}</span>
                <span style="font-size:11px;color:#9ca3af;margin-right:4px;">${childDone}/${s.children.length}</span>
                <span style="font-size:11px;color:#9ca3af;">${s.open?"▲":"▼"}</span>
              </div>
            </div>`;
          if (s.open) {
            html += `<div style="margin-left:20px;border-left:2px solid #e5e7eb;padding-left:10px;margin-top:3px;">`;
            s.children.forEach((c,ci) => {
              html += `<div style="border:1px solid #e5e7eb;border-radius:8px;margin-bottom:4px;background:${c.done?"#f9fafb":"#fff"};opacity:${c.done?0.7:1};">

                  <span style="flex:1;font-size:12px;color:${c.done?"#9ca3af":"#374151"};text-decoration:${c.done?"line-through":"none"};">${esc(c.text)}</span>
                  <span style="font-size:10px;color:#9ca3af;">▼</span>
                </div>
                <div id="cnote-${c.id}" class="child-note" style="padding:6px 12px 10px 40px;">
                  <textarea style="width:100%;border:1px solid #e5e7eb;border-radius:6px;padding:6px 10px;font-size:12px;resize:vertical;min-height:60px;outline:none;box-sizing:border-box;color:#374151;" placeholder="Notes…" oninput="setSubtaskNote('${c.id}',this.value)">${esc(c.note||"")}</textarea>
                  <div style="margin-top:6px;display:flex;justify-content:flex-end;">
                    <button onclick="toggleSubtask('${c.id}')" style="font-size:11px;color:${proj.color};background:none;border:1px solid ${proj.color};border-radius:6px;padding:3px 10px;cursor:pointer;">${c.done?"✓ Done":"Mark as done"}</button>
                  </div>
                </div>
              </div>`;
            });
            html += `</div>`;
          }
          html += `</div>`;
        } else {
          html += subtaskItemHtml(s, idx, proj.color, false, group==="Research");
        }
      });
      html += `</div>`;
    });
    html += `</div>`;
  }

  // Reports (courses)
  if (!isThesis) {
    if (SYLLABUS[proj.id]) {
      html += accordionHtml("syl-"+proj.id, "🤍", "Syllabus", proj.color, SYLLABUS[proj.id].sections);
    }
    html += `<div style="font-size:10px;font-weight:700;color:#9ca3af;letter-spacing:1px;text-transform:uppercase;margin:20px 0 8px;">Reports</div>`;
    ["前期","後期"].forEach(sem => {
      const semReports = proj.reports.filter(r=>r.label.includes(`〈${sem}〉`));
      if (!semReports.length) return;
      html += `<div>
        <div style="display:flex;align-items:center;gap:8px;margin:10px 0 6px;">
          <span style="font-size:12px;font-weight:700;color:${proj.color};">〈${sem}〉</span>
          <div style="flex:1;height:1px;background:#e5e7eb;"></div>
        </div>`;
      semReports.forEach(r => {
        const dn = r.steps.filter(s=>s.done).length;
        const rPct = Math.round(dn/r.steps.length*100);
        const shortLabel = circleToNum(r.label.replace(/〈前期〉|〈後期〉/g,"").trim().replace("レポート","Report"));
        html += `<div class="report-card">
          <div class="report-header" onclick="toggleReport('${r.id}')">
            <div style="flex:1;">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                <span style="font-size:13px;font-weight:600;color:#1f2937;">${esc(shortLabel)}</span>
                <span style="font-size:11px;color:#6b7280;">Due ${r.deadline?.slice(5).replace("-","/")}</span>
                ${badgeHtml(r.deadline)}
              </div>
              ${pbarHtml(rPct,proj.color)}
              <span style="font-size:11px;color:#9ca3af;">Progress: ${dn}/${r.steps.length} steps completed　／　Final: ${r.finalDeadline?.slice(5).replace("-","/")} </span>
            </div>
            <span style="font-size:12px;color:#9ca3af;">${r.open?"▲":"▼"}</span>
          </div>`;
        if (r.open) {
          html += `<div class="report-body">`;
          r.steps.forEach((s,i) => {
            html += `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:${i<r.steps.length-1?"1px solid #f9fafb":"none"};">
              <input type="checkbox" ${s.done?"checked":""} onchange="toggleStep('${r.id}','${s.id}')" style="width:15px;height:15px;accent-color:${proj.color};flex-shrink:0;">
              <span style="flex:1;font-size:13px;color:${s.done?"#9ca3af":"#374151"};text-decoration:${s.done?"line-through":"none"};">
                <span style="font-size:11px;color:#d1d5db;margin-right:6px;">${i+1}.</span>${esc(s.text)}
              </span>
              ${i===3?badgeHtml(r.finalDeadline):""}
            </div>`;
          });
          html += `<div style="margin-top:10px;">${
            r.url
              ? `<div style="display:flex;align-items:center;gap:6px;"><a href="${esc(r.url)}" target="_blank" style="flex:1;font-size:12px;color:${proj.color};text-decoration:none;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:5px 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;">📄 ${esc(r.url.replace("https://","").slice(0,45))}…</a><button onclick="clearReportUrl('${r.id}')" style="background:none;border:none;color:#d1d5db;cursor:pointer;font-size:14px;">×</button></div>`
              : `<input class="url-input" placeholder="Google Drive URL…" onblur="if(this.value){setReportUrl('${r.id}',this.value);this.value='';}"`+`>`
          }</div></div>`;
        }
        html += `</div>`;
      });
      html += `</div>`;
    });
  }

  // Memo
  html += `<div style="margin-top:24px;">
    <div style="font-size:10px;font-weight:700;color:#9ca3af;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Memo</div>
    <textarea class="memo-area" placeholder="Notes, references, feedback…" oninput="updateMemo('${proj.id}',this.value)">${esc(proj.memo||"")}</textarea>
  </div>`;

  if (isThesis) {
    html += accordionHtml("guide", "📄", "覚書：レポート・修論の書き方", proj.color, GUIDE_SECTIONS);
  }

  html += `<div id="save-status" style="font-size:11px;color:#9ca3af;margin-top:12px;">✓ Saved</div>`;
  return html;
}

function renderSaveStatus(saving=false) {
  const el = document.getElementById('save-status');
  if (el) el.textContent = saving ? "Saving…" : `✓ Saved (${(JSON.stringify(projects).length/1024).toFixed(1)}kb)`;
}

function renderSidebar() {
  const sideProjects = document.getElementById('sidebar-projects');
  sideProjects.innerHTML = projects.map(p => {
    const tot = p.tasks ? [...p.tasks,...(p.subtasks||[])].length : p.reports ? p.reports.reduce((a,r)=>a+r.steps.length,0) : 0;
    const dn  = p.tasks ? [...p.tasks,...(p.subtasks||[])].filter(t=>t.done).length : p.reports ? p.reports.reduce((a,r)=>a+r.steps.filter(s=>s.done).length,0) : 0;
    const active = selected===p.id && currentView==="project";
    return `<div onclick="selectProject('${p.id}')" style="padding:8px 18px;cursor:pointer;border-left:${active?`3px solid ${p.color}`:"3px solid transparent"};background:${active?"#f3f4f6":"transparent"};">
      <div style="display:flex;align-items:center;gap:7px;">
        <span style="width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0;"></span>
        <span style="flex:1;font-size:12px;color:#1f2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.title)}</span>
        <span style="font-size:11px;color:#9ca3af;">${dn}/${tot}</span>
      </div>
      <div style="margin-left:15px;">${pbarHtml(calcPct(p),p.color)}</div>
    </div>`;
  }).join("");

  // view toggle buttons
  const btnP = document.getElementById('btn-project');
  const btnT = document.getElementById('btn-timeline');
  [btnP,btnT].forEach(b=>b&&(b.style.background="transparent",b.style.color="#9ca3af",b.style.boxShadow="none"));
  const active = currentView==="project"?btnP:btnT;
  if(active){ active.style.background="#fff"; active.style.color="#111"; active.style.boxShadow="0 1px 3px rgba(0,0,0,.1)"; }
}

function renderMain() {
  const main = document.getElementById('main');
  main.innerHTML = currentView==="timeline" ? renderTimeline() : renderProjectView();
}

function render() {
  renderSidebar();
  renderMain();
}

// ── Init ───────────────────────────────────────────────
(function init(){
  const saved = loadData();
  projects = saved || DEFAULT_PROJECTS;
  render();
})();
</script>
</body>
</html>
